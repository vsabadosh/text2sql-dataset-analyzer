<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #4a4a4a; }
      .label { font-family: Arial, sans-serif; font-size: 13px; fill: #2c3e50; font-weight: 500; }
      .small-text { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
      .stage-box { fill: #e8f4f8; stroke: #3498db; stroke-width: 3; }
      .data-box { fill: #fff9e6; stroke: #f39c12; stroke-width: 2; }
      .process-box { fill: #e8f8f5; stroke: #16a085; stroke-width: 2; }
      .output-box { fill: #fdecea; stroke: #e74c3c; stroke-width: 2; }
      .optional-box { fill: #fff3cd; stroke: #ff9800; stroke-width: 2; stroke-dasharray: 5,5; }
      .arrow { stroke: #2c3e50; stroke-width: 3; fill: none; marker-end: url(#arrowhead2); }
      .arrow-label { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; font-weight: bold; }
      .code-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #2c3e50; }
      .time-label { font-family: Arial, sans-serif; font-size: 10px; fill: #7f8c8d; font-style: italic; }
    </style>
    <marker id="arrowhead2" markerWidth="12" markerHeight="12" refX="11" refY="3" orient="auto">
      <polygon points="0 0, 12 3, 0 6" fill="#2c3e50" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="700" y="30" text-anchor="middle" class="title">Потік даних через систему Text2SQL Pipeline</text>
  <text x="700" y="50" text-anchor="middle" class="subtitle">Потокова обробка запису від входу до виходу (5 рівнів)</text>
  
  <!-- Stage 1: Input Data -->
  <rect x="50" y="80" width="280" height="120" class="data-box" rx="8"/>
  <text x="190" y="110" text-anchor="middle" class="label" font-weight="bold">Вхідні дані</text>
  <text x="190" y="130" text-anchor="middle" class="code-text">{</text>
  <text x="190" y="145" text-anchor="middle" class="code-text">"question": "Show students...",</text>
  <text x="190" y="160" text-anchor="middle" class="code-text">"query": "SELECT * FROM...",</text>
  <text x="190" y="175" text-anchor="middle" class="code-text">"db_id": "university"</text>
  <text x="190" y="190" text-anchor="middle" class="code-text">}</text>
  
  <!-- Arrow 1 -->
  <path d="M 330 140 L 430 140" class="arrow"/>
  <text x="380" y="130" text-anchor="middle" class="arrow-label">LOAD</text>
  
  <!-- Stage 2: Normalization -->
  <rect x="430" y="80" width="280" height="120" class="process-box" rx="8"/>
  <text x="570" y="105" text-anchor="middle" class="label" font-weight="bold">Нормалізація</text>
  <text x="570" y="125" text-anchor="middle" class="small-text">1. Alias Mapper</text>
  <text x="570" y="142" text-anchor="middle" class="code-text">query → sql, db_id → dbId</text>
  <text x="570" y="160" text-anchor="middle" class="small-text">2. ID Assignment</text>
  <text x="570" y="177" text-anchor="middle" class="code-text">id = "abc123_hash"</text>
  <text x="570" y="195" text-anchor="middle" class="small-text">3. DB Verification</text>
  
  <!-- Arrow 2 -->
  <path d="M 710 140 L 810 140" class="arrow"/>
  <text x="760" y="130" text-anchor="middle" class="arrow-label">NORMALIZE</text>
  
  <!-- Stage 3: DataItem -->
  <rect x="810" y="80" width="280" height="120" class="stage-box" rx="8"/>
  <text x="950" y="105" text-anchor="middle" class="label" font-weight="bold">Стандартизований DataItem</text>
  <text x="950" y="125" text-anchor="middle" class="code-text">DataItem {</text>
  <text x="950" y="140" text-anchor="middle" class="code-text">id: str, question: str,</text>
  <text x="950" y="155" text-anchor="middle" class="code-text">sql: str, dbId: str,</text>
  <text x="950" y="170" text-anchor="middle" class="code-text">schema: Optional[str],</text>
  <text x="950" y="185" text-anchor="middle" class="code-text">metadata: dict</text>
  <text x="950" y="200" text-anchor="middle" class="code-text">}</text>
  
  <!-- Arrow 3 -->
  <path d="M 950 200 L 950 260" class="arrow"/>
  <text x="990" y="235" text-anchor="start" class="arrow-label">STREAM</text>
  
  <!-- Analysis Pipeline Container -->
  <rect x="50" y="260" width="1300" height="340" class="stage-box" rx="8"/>
  <text x="700" y="285" text-anchor="middle" class="label" font-weight="bold" font-size="16px">АНАЛІТИЧНИЙ КОНВЕЄР (Streaming через 5 аналізаторів)</text>
  
  <!-- Analyzer 1: Schema Validation -->
  <rect x="100" y="310" width="220" height="90" class="process-box" rx="5"/>
  <text x="210" y="330" text-anchor="middle" class="label">Schema Validation</text>
  <text x="210" y="350" text-anchor="middle" class="small-text">• Перевірка FK integrity</text>
  <text x="210" y="368" text-anchor="middle" class="small-text">• Validate column types</text>
  <text x="210" y="386" text-anchor="middle" class="small-text">• Cache по db_id</text>
  <path d="M 320 355 L 380 355" class="arrow" stroke-width="2"/>
  <text x="210" y="420" text-anchor="middle" class="time-label">~14ms/запит</text>
  
  <!-- Analyzer 2: Query Syntax -->
  <rect x="380" y="310" width="220" height="90" class="process-box" rx="5"/>
  <text x="490" y="330" text-anchor="middle" class="label">Query Syntax</text>
  <text x="490" y="350" text-anchor="middle" class="small-text">• Parse SQL (sqlglot)</text>
  <text x="490" y="368" text-anchor="middle" class="small-text">• Extract features</text>
  <text x="490" y="386" text-anchor="middle" class="small-text">• Calculate complexity</text>
  <path d="M 600 355 L 660 355" class="arrow" stroke-width="2"/>
  <text x="490" y="420" text-anchor="middle" class="time-label">~2ms/запит</text>
  
  <!-- Analyzer 3: Query Execution -->
  <rect x="660" y="310" width="220" height="90" class="process-box" rx="5"/>
  <text x="770" y="330" text-anchor="middle" class="label">Query Execution</text>
  <text x="770" y="350" text-anchor="middle" class="small-text">• Safe execution</text>
  <text x="770" y="368" text-anchor="middle" class="small-text">• Measure time</text>
  <text x="770" y="386" text-anchor="middle" class="small-text">• Count rows</text>
  <path d="M 880 355 L 940 355" class="arrow" stroke-width="2"/>
  <text x="770" y="420" text-anchor="middle" class="time-label">~3ms/запит</text>
  
  <!-- Analyzer 4: Antipattern -->
  <rect x="100" y="450" width="220" height="90" class="process-box" rx="5"/>
  <text x="210" y="470" text-anchor="middle" class="label">Antipattern Detector</text>
  <text x="210" y="490" text-anchor="middle" class="small-text">• Scan 14 patterns</text>
  <text x="210" y="508" text-anchor="middle" class="small-text">• Quality score</text>
  <text x="210" y="526" text-anchor="middle" class="small-text">• Severity rating</text>
  <path d="M 320 495 L 380 495" class="arrow" stroke-width="2"/>
  <text x="210" y="560" text-anchor="middle" class="time-label">~1ms/запит</text>
  
  <!-- Analyzer 5: LLM Judge -->
  <rect x="380" y="450" width="500" height="90" class="process-box" rx="5"/>
  <text x="630" y="470" text-anchor="middle" class="label">Semantic LLM Judge (Consensus Voting)</text>
  <text x="480" y="490" text-anchor="middle" class="small-text">1. Generate smart DDL</text>
  <text x="480" y="508" text-anchor="middle" class="small-text">2. Query LLM voters</text>
  <text x="480" y="526" text-anchor="middle" class="small-text">3. Aggregate results</text>
  <text x="780" y="490" text-anchor="middle" class="small-text">GPT-4o: CORRECT (0.8)</text>
  <text x="780" y="508" text-anchor="middle" class="small-text">Gemini: CORRECT (0.8)</text>
  <text x="780" y="526" text-anchor="middle" class="small-text">Consensus: CORRECT ✓</text>
  <text x="630" y="560" text-anchor="middle" class="time-label">~21 сек/запит (залежить від API)</text>
  
  <!-- Arrow connecting last two analyzers to a merge point -->
  <path d="M 940 355 L 1000 355 L 1000 425 L 950 425" class="arrow" stroke-width="2"/>
  <path d="M 880 495 L 1000 495 L 1000 435 L 950 435" class="arrow" stroke-width="2"/>
  
  <!-- Performance note -->
  <text x="700" y="580" text-anchor="middle" class="time-label" font-size="11px" font-weight="bold">
    ⚡ Загальний час обробки: ~50-100ms без LLM / ~2-10 сек з LLM judge
  </text>
  
  <!-- LEVEL 4: OUTPUT LAYER (Two parallel outputs) -->
  <rect x="50" y="620" width="1300" height="140" fill="#f9f9f9" stroke="#2c3e50" stroke-width="3" rx="8"/>
  <text x="700" y="645" text-anchor="middle" class="label" font-weight="bold" font-size="16px">РІВЕНЬ 4: ВИХІДНИЙ ШАР (Output Layer)</text>
  
  <!-- Left: Annotated Dataset -->
  <rect x="150" y="665" width="450" height="80" class="stage-box" rx="8"/>
  <text x="375" y="690" text-anchor="middle" class="label" font-weight="bold">Анотований Dataset</text>
  <text x="375" y="710" text-anchor="middle" class="code-text">annotatedOutputDataset.jsonl</text>
  <text x="375" y="728" text-anchor="middle" class="small-text">+ metadata від усіх аналізаторів</text>
  
  <!-- Right: DuckDB Analytics -->
  <ellipse cx="950" cy="705" rx="180" ry="60" fill="#fdecea" stroke="#e74c3c" stroke-width="3"/>
  <text x="950" y="695" text-anchor="middle" class="label" font-size="16px" fill="#e74c3c" font-weight="bold">DuckDB Analytics</text>
  <text x="950" y="715" text-anchor="middle" class="small-text" fill="#e74c3c">metrics.duckdb</text>
  <text x="950" y="730" text-anchor="middle" class="small-text" fill="#e74c3c">(Single Source of Truth)</text>
  
  <!-- Arrow from analyzer merge point to DuckDB -->
  <path d="M 950 430 L 950 645" class="arrow"/>
  <text x="970" y="540" text-anchor="start" class="arrow-label">METRICS</text>
  
  <!-- Arrows DOWN from Level 4 outputs -->
  <path d="M 375 760 L 375 810" class="arrow"/>
  <path d="M 950 765 L 950 810" class="arrow"/>
  
  <!-- LEVEL 5: REPORT GENERATION (Optional) -->
  <rect x="50" y="810" width="1300" height="140" class="optional-box" rx="8"/>
  <text x="700" y="835" text-anchor="middle" class="label" font-weight="bold" font-size="16px" fill="#ff6f00">РІВЕНЬ 5: ГЕНЕРАЦІЯ ЗВІТНОСТІ (Опційний)</text>
  <text x="700" y="855" text-anchor="middle" class="small-text" fill="#ff6f00" font-style="italic">Читає дані з DuckDB → Генерує Markdown звіти</text>
  
  <!-- Reports -->
  <rect x="150" y="875" width="220" height="60" fill="white" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="260" y="895" text-anchor="middle" class="small-text" font-weight="bold">7 типів MD звітів:</text>
  <text x="260" y="912" text-anchor="middle" class="small-text">Summary, Schema, LLM Issues,</text>
  <text x="260" y="927" text-anchor="middle" class="small-text">Execution, Structure, Coverage, Quality</text>
  
  <!-- Arrow from DuckDB to Reports -->
  <path d="M 950 810 L 950 860 L 370 860" class="arrow" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="650" y="850" text-anchor="middle" class="arrow-label" fill="#ff6f00">SQL queries</text>
  
  <!-- Note -->
  <text x="950" y="895" text-anchor="middle" class="small-text" fill="#ff6f00" font-style="italic">
    ⚙️ reports.enabled = true/false
  </text>
  <text x="950" y="915" text-anchor="middle" class="small-text" fill="#ff6f00" font-style="italic">
    ♻️ Можна регенерувати
  </text>
  <text x="950" y="935" text-anchor="middle" class="small-text" fill="#ff6f00" font-style="italic">
    БЕЗ повторного аналізу
  </text>
</svg>

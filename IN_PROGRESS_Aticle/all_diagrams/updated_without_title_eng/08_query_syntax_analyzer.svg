<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 1200 900"
   version="1.1"
   id="svg-query-syntax"
   xmlns="http://www.w3.org/2000/svg">
  <defs id="defs-query">
    <style id="style-query">
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #4a4a4a; }
      .label { font-family: Arial, sans-serif; font-size: 13px; fill: #2c3e50; font-weight: 500; }
      .small-text { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
      .tiny-text { font-family: Arial, sans-serif; font-size: 10px; fill: #34495e; }
      .input-box { fill: #e8f4f8; stroke: #3498db; stroke-width: 3; }
      .step-box { fill: #fff; stroke: #3498db; stroke-width: 2; }
      .process-box { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; }
      .metric-box { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; }
      .output-box { fill: #d5f4e6; stroke: #27ae60; stroke-width: 3; }
      .arrow { stroke: #2c3e50; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .flow-arrow { stroke: #3498db; stroke-width: 2.5; fill: none; marker-end: url(#flow-arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2c3e50" />
    </marker>
    <marker id="flow-arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3498db" />
    </marker>
  </defs>

  <!-- Input SQL Query -->
  <rect x="450" y="50" width="300" height="80" class="input-box" rx="8" />
  <text x="600" y="75" text-anchor="middle" class="label" font-weight="bold" font-size="15px">📥 Input: SQL Query</text>
  <text x="470" y="100" text-anchor="start" class="small-text">Raw SQL statement from dataset</text>
  <text x="470" y="118" text-anchor="start" class="small-text">Potentially complex with nested structures</text>

  <!-- Arrow to parsing -->
  <path d="M 600 130 L 600 170" class="flow-arrow" />

  <!-- Stage 1: SQL Parsing -->
  <rect x="400" y="170" width="400" height="100" class="step-box" rx="8" />
  <text x="600" y="195" text-anchor="middle" class="label" font-weight="bold" font-size="15px">🔍 Stage 1: Abstract Syntax Tree Construction</text>
  <text x="420" y="220" text-anchor="start" class="small-text">• Parse SQL using dialect-aware parser (sqlglot)</text>
  <text x="420" y="238" text-anchor="start" class="small-text">• Generate Abstract Syntax Tree (AST)</text>
  <text x="420" y="256" text-anchor="start" class="small-text">• Detect syntax errors and dialect incompatibilities</text>

  <!-- Arrow to feature extraction -->
  <path d="M 600 270 L 600 310" class="flow-arrow" />

  <!-- Stage 2: Feature Extraction -->
  <rect x="100" y="310" width="1000" height="120" class="process-box" rx="8" />
  <text x="600" y="335" text-anchor="middle" class="label" font-weight="bold" font-size="15px">🔬 Stage 2: Structural Feature Extraction</text>
  
  <!-- Feature columns -->
  <g>
    <rect x="120" y="350" width="180" height="65" fill="#fff" stroke="#4caf50" stroke-width="1.5" rx="5" />
    <text x="210" y="370" text-anchor="middle" class="small-text" font-weight="bold">Basic Structures</text>
    <text x="130" y="388" text-anchor="start" class="tiny-text">• SELECT clauses</text>
    <text x="130" y="401" text-anchor="start" class="tiny-text">• WHERE predicates</text>
    <text x="130" y="414" text-anchor="start" class="tiny-text">• GROUP BY clauses</text>
  </g>

  <g>
    <rect x="320" y="350" width="180" height="65" fill="#fff" stroke="#4caf50" stroke-width="1.5" rx="5" />
    <text x="410" y="370" text-anchor="middle" class="small-text" font-weight="bold">Joins &amp; Relations</text>
    <text x="330" y="388" text-anchor="start" class="tiny-text">• JOIN count &amp; types</text>
    <text x="330" y="401" text-anchor="start" class="tiny-text">• Table references</text>
    <text x="330" y="414" text-anchor="start" class="tiny-text">• Relationship depth</text>
  </g>

  <g>
    <rect x="520" y="350" width="180" height="65" fill="#fff" stroke="#4caf50" stroke-width="1.5" rx="5" />
    <text x="610" y="370" text-anchor="middle" class="small-text" font-weight="bold">Advanced Features</text>
    <text x="530" y="388" text-anchor="start" class="tiny-text">• Subquery depth</text>
    <text x="530" y="401" text-anchor="start" class="tiny-text">• CTE usage</text>
    <text x="530" y="414" text-anchor="start" class="tiny-text">• Window functions</text>
  </g>

  <g>
    <rect x="720" y="350" width="180" height="65" fill="#fff" stroke="#4caf50" stroke-width="1.5" rx="5" />
    <text x="810" y="370" text-anchor="middle" class="small-text" font-weight="bold">Aggregations</text>
    <text x="730" y="388" text-anchor="start" class="tiny-text">• Aggregate functions</text>
    <text x="730" y="401" text-anchor="start" class="tiny-text">• HAVING clauses</text>
    <text x="730" y="414" text-anchor="start" class="tiny-text">• DISTINCT operations</text>
  </g>

  <g>
    <rect x="920" y="350" width="160" height="65" fill="#fff" stroke="#4caf50" stroke-width="1.5" rx="5" />
    <text x="1000" y="370" text-anchor="middle" class="small-text" font-weight="bold">Set Operations</text>
    <text x="930" y="388" text-anchor="start" class="tiny-text">• UNION/INTERSECT</text>
    <text x="930" y="401" text-anchor="start" class="tiny-text">• EXCEPT clauses</text>
    <text x="930" y="414" text-anchor="start" class="tiny-text">• Set nesting</text>
  </g>

  <!-- Arrow to complexity -->
  <path d="M 600 430 L 600 470" class="flow-arrow" />

  <!-- Stage 3: Complexity Computation -->
  <rect x="350" y="470" width="500" height="110" class="metric-box" rx="8" />
  <text x="600" y="495" text-anchor="middle" class="label" font-weight="bold" font-size="15px">📊 Stage 3: Complexity Score Calculation</text>
  <text x="370" y="520" text-anchor="start" class="small-text">Normalized complexity metric (0-100 scale) computed from:</text>
  <text x="370" y="540" text-anchor="start" class="small-text">• Weighted feature counts (JOINs, subqueries, aggregations)</text>
  <text x="370" y="558" text-anchor="start" class="small-text">• Nesting depth penalties (exponential scaling)</text>
  <text x="370" y="576" text-anchor="start" class="small-text">• Structural pattern bonuses (CTEs, window functions)</text>

  <!-- Arrow to classification -->
  <path d="M 600 580 L 600 620" class="flow-arrow" />

  <!-- Stage 4: Difficulty Classification -->
  <rect x="200" y="620" width="800" height="110" class="step-box" rx="8" />
  <text x="600" y="645" text-anchor="middle" class="label" font-weight="bold" font-size="15px">🎯 Stage 4: Difficulty Classification</text>
  
  <g>
    <rect x="220" y="660" width="160" height="55" fill="#d5f4e6" stroke="#27ae60" stroke-width="2" rx="5" />
    <text x="300" y="680" text-anchor="middle" class="small-text" font-weight="bold">Easy (0-25)</text>
    <text x="230" y="698" text-anchor="start" class="tiny-text">Simple SELECT</text>
    <text x="230" y="710" text-anchor="start" class="tiny-text">Basic filtering</text>
  </g>

  <g>
    <rect x="400" y="660" width="160" height="55" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5" />
    <text x="480" y="680" text-anchor="middle" class="small-text" font-weight="bold">Medium (26-50)</text>
    <text x="410" y="698" text-anchor="start" class="tiny-text">JOINs, GROUP BY</text>
    <text x="410" y="710" text-anchor="start" class="tiny-text">Basic aggregations</text>
  </g>

  <g>
    <rect x="580" y="660" width="160" height="55" fill="#ffe8e0" stroke="#ff5722" stroke-width="2" rx="5" />
    <text x="660" y="680" text-anchor="middle" class="small-text" font-weight="bold">Hard (51-75)</text>
    <text x="590" y="698" text-anchor="start" class="tiny-text">Subqueries, CTEs</text>
    <text x="590" y="710" text-anchor="start" class="tiny-text">Complex JOINs</text>
  </g>

  <g>
    <rect x="760" y="660" width="160" height="55" fill="#fadbd8" stroke="#d32f2f" stroke-width="2" rx="5" />
    <text x="840" y="680" text-anchor="middle" class="small-text" font-weight="bold">Expert (76-100)</text>
    <text x="770" y="698" text-anchor="start" class="tiny-text">Deep nesting</text>
    <text x="770" y="710" text-anchor="start" class="tiny-text">Window functions</text>
  </g>

  <!-- Arrow to output -->
  <path d="M 600 730 L 600 770" class="flow-arrow" />

  <!-- Output Metrics -->
  <rect x="400" y="770" width="400" height="100" class="output-box" rx="8" />
  <text x="600" y="795" text-anchor="middle" class="label" font-weight="bold" font-size="15px">📤 Output: Structural Metrics</text>
  <text x="420" y="820" text-anchor="start" class="small-text">• Complexity score (0-100) and difficulty level</text>
  <text x="420" y="838" text-anchor="start" class="small-text">• Feature vector (JOIN count, subquery depth, etc.)</text>
  <text x="420" y="856" text-anchor="start" class="small-text">• Parsing success/failure status with error details</text>

</svg>


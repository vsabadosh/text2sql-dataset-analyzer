     class="label"
     font-weight="bold"
     font-size="16px"
     id="text55">LEVEL 4: OUTPUT LAYER</text>
  <!-- Left: Annotated Dataset -->
  <rect
     x="292.38715"
     y="624.62396"
     width="250.3141"
     height="80.752029"
     class="stage-box"
     rx="4.4500284"

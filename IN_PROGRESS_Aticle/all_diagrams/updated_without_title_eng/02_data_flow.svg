  <!-- Title -->
  <text
     x="700"
     y="30"
     text-anchor="middle"
     class="title"
     id="text1">Data flow through the Text2SQL Pipeline</text>
  <text
     x="700"
     y="50"
     text-anchor="middle"
     class="subtitle"
     id="text2">Streaming processing from input to output (5 levels)</text>
  <!-- Stage 1: Input Data -->
  <rect
     x="130.1832"
     y="79.897018"
     width="224.91275"
     height="120.20597"
     class="data-box"
     rx="6.4260783"
     id="rect2" />
  <text
     x="232"
     y="110"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     id="text3">LEVEL 1. INPUT LAYER</text>
  <text
     x="232"
     y="130"
     text-anchor="middle"
     class="code-text"
     id="text4">{</text>
  <text
     x="234"
     y="145"
     text-anchor="middle"
     class="code-text"
     id="text5">&quot;question&quot;: &quot;Show students...&quot;,</text>
  <text
     x="226"
     y="160"
     text-anchor="middle"
     class="code-text"
     id="text6">&quot;query&quot;: &quot;SELECT * FROM...&quot;,</text>
  <text
     x="204"
     y="175"
     text-anchor="middle"
     class="code-text"
     id="text7">&quot;db_id&quot;: &quot;university&quot;</text>
  <text
     x="232"
     y="190"
     text-anchor="middle"
     class="code-text"
     id="text8">}</text>
  <!-- Arrow 1 -->
  <path
     d="M 356,140 H 456"
     class="arrow"
     id="path8" />
  <text
     x="396"
     y="130"
     text-anchor="middle"
     class="arrow-label"
     id="text9">LOAD</text>
  <!-- Stage 2: Normalization -->
  <rect
     x="455.8157"
     y="79.897018"
     width="224.91273"
     height="120.20598"
     class="process-box"
     rx="6.4260783"
     id="rect9" />
  <text
     x="570"
     y="105"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     id="text10">LEVEL 2. NORMALIZATION</text>
  <text
     x="566"
     y="125"
     text-anchor="middle"
     class="small-text"
     id="text11">1. Alias Mapper</text>
  <text
     x="570"
     y="142"
     text-anchor="middle"
     class="code-text"
     id="text12">query → sql, db_id → dbId</text>
  <text
     x="570"
     y="160"
     text-anchor="middle"
     class="small-text"
     id="text13">2. ID Assignment</text>
  <text
     x="570"
     y="177"
     text-anchor="middle"
     class="code-text"
     id="text14">id = &quot;abc123_hash&quot;</text>
  <text
     x="570"
     y="195"
     text-anchor="middle"
     class="small-text"
     id="text15">3. DB Verification</text>
  <!-- Arrow 2 -->
  <path
     d="M 682,140 H 782"
     class="arrow"
     id="path15" />
  <text
     x="732"
     y="130"
     text-anchor="middle"
     class="arrow-label"
     id="text16">NORMALIZE</text>
  <!-- Stage 3: DataItem -->
  <rect
     x="784.0321"
     y="79.841301"
     width="223.29626"
     height="120.3174"
     class="stage-box"
     rx="6.3798933"
     id="rect16" />
  <text
     x="902"
     y="105"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     id="text17">Standardized DataItem</text>
  <text
     x="902"
     y="125"
     text-anchor="middle"
     class="code-text"
     id="text18">DataItem {</text>
  <text
     x="902"
     y="140"
     text-anchor="middle"
     class="code-text"
     id="text19">id: str, question: str,</text>
  <text
     x="902"
     y="155"
     text-anchor="middle"
     class="code-text"
     id="text20">sql: str, dbId: str,</text>
  <text
     x="902"
     y="170"
     text-anchor="middle"
     class="code-text"
     id="text21">schema: Optional[str],</text>
  <text
     x="902"
     y="185"
     text-anchor="middle"
     class="code-text"
     id="text22">metadata: dict</text>
  <text
     x="902"
     y="200"
     text-anchor="middle"
     class="code-text"
     id="text23">}</text>
  <!-- Arrow 3 -->
  <text
     x="900"
     y="223"
     text-anchor="start"
     class="arrow-label"
     id="text24">STREAM</text>
  <!-- Analysis Pipeline Container -->
  <rect
     x="127.42757"
     y="235.92932"
     width="884.21222"
     height="317.30246"
     class="stage-box"
     rx="5.4413061"
     id="rect24"
     ry="5.4413061" />
  <path
     d="m 685.99999,330 h 53.26362"
     class="arrow"
     id="path8-0-3"
     style="fill:none;stroke:#2c3e50;stroke-width:3;marker-end:url(#arrowhead2-9-4)" />
  <path
     d="m 404.34609,328 h 55.34206"
     class="arrow"
     id="path8-0"
     style="fill:none;stroke:#2c3e50;stroke-width:3;marker-end:url(#arrowhead2-9)" />
  <text
     x="576"
     y="261"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     font-size="16px"
     id="text25">LEVEL 3. ANALYSIS PIPELINE (Streaming through 5 analyzers)</text>
  <!-- Analyzer 1: Schema Validation -->
  <rect
     x="182"
     y="282"
     width="220"
     height="90"
     class="process-box"
     rx="5"
     id="rect25" />
  <text
     x="292"
     y="302"
     text-anchor="middle"
     class="label"
     id="text26">Schema Validation</text>
  <text
     x="282"
     y="322"
     text-anchor="middle"
     class="small-text"
     id="text27">• Check FK integrity</text>
  <text
     x="290"
     y="340"
     text-anchor="middle"
     class="small-text"
     id="text28">• Validate column types</text>
  <text
     x="276"
     y="358"
     text-anchor="middle"
     class="small-text"
     id="text29">• Cache by db_id</text>
  <text
     x="292"
     y="392"
     text-anchor="middle"
     class="time-label"
     id="text30">~14ms/request</text>
  <!-- Analyzer 2: Query Syntax -->
  <rect
     x="462"
     y="282"
     width="220"
     height="90"
     class="process-box"
     rx="5"
     id="rect30" />
  <text
     x="572"
     y="302"
     text-anchor="middle"
     class="label"
     id="text31">Query Syntax</text>
  <text
     x="572"
     y="322"
     text-anchor="middle"
     class="small-text"
     id="text32">• Parse SQL (sqlglot)</text>
  <text
     x="562"
     y="340"
     text-anchor="middle"
     class="small-text"
     id="text33">• Extract features</text>
  <text
     x="574"
     y="358"
     text-anchor="middle"
     class="small-text"
     id="text34">• Calculate complexity</text>
  <text
     x="572"
     y="392"
     text-anchor="middle"
     class="time-label"
     id="text35">~2ms/request</text>
  <!-- Analyzer 3: Query Execution -->
  <rect
     x="742"
     y="282"
     width="220"
     height="90"
     class="process-box"
     rx="5"
     id="rect35" />
  <text
     x="852"
     y="302"
     text-anchor="middle"
     class="label"
     id="text36">Query Execution</text>
  <text
     x="850"
     y="322"
     text-anchor="middle"
     class="small-text"
     id="text37">• Safe execution</text>
  <text
     x="848"
     y="340"
     text-anchor="middle"
     class="small-text"
     id="text38">• Measure time</text>
  <text
     x="842"
     y="358"
     text-anchor="middle"
     class="small-text"
     id="text39">• Count rows</text>
  <text
     x="852"
     y="392"
     text-anchor="middle"
     class="time-label"
     id="text40">~3ms/request</text>
  <!-- Analyzer 4: Antipattern -->
  <rect
     x="698.09497"
     y="407.8045"
     width="220"
     height="90"
     class="process-box"
     rx="5"
     id="rect40"
     ry="5" />
  <text
     x="808.09497"
     y="427.8045"
     text-anchor="middle"
     class="label"
     id="text41">Antipattern Detector</text>
  <text
     x="808.09497"
     y="447.8045"
     text-anchor="middle"
     class="small-text"
     id="text42">• Scan 14 patterns</text>
  <text
     x="800.09497"
     y="465.8045"
     text-anchor="middle"
     class="small-text"
     id="text43">• Quality score</text>
  <text
     x="804.09497"
     y="483.8045"
     text-anchor="middle"
     class="small-text"
     id="text44">• Severity rating</text>
  <text
     x="822.09497"
     y="519.8045"
     text-anchor="middle"
     class="time-label"
     id="text45">~1ms/request</text>
  <!-- Analyzer 5: LLM Judge -->
  <rect
     x="231.78737"
     y="405.41348"
     width="383.81119"
     height="90"
     class="process-box"
     rx="5"
     id="rect45"
     ry="5" />
  <text
     x="427.56146"
     y="425.41348"
     text-anchor="middle"
     class="label"
     id="text46">Semantic LLM Judge (Consensus Voting)</text>
  <text
     x="337.56146"
     y="445.41348"
     text-anchor="middle"
     class="small-text"
     id="text47">1. Generate smart DDL</text>
  <text
     x="329.56146"
     y="463.41348"
     text-anchor="middle"
     class="small-text"
     id="text48">2. Query LLM voters</text>
  <text
     x="329.56146"
     y="481.41348"
     text-anchor="middle"
     class="small-text"
     id="text49">3. Aggregate results</text>
  <text
     x="497.56146"
     y="445.41348"
     text-anchor="middle"
     class="small-text"
     id="text50">GPT-5: CORRECT (0.8)</text>
  <text
     x="519.56146"
     y="463.41348"
     text-anchor="middle"
     class="small-text"
     id="text51">Gemini 2.5 Pro: CORRECT (0.8)</text>
  <text
     x="503.56146"
     y="481.41348"
     text-anchor="middle"
     class="small-text"
     id="text52">Consensus: CORRECT ✓</text>
  <text
     x="427.56146"
     y="515.41345"
     text-anchor="middle"
     class="time-label"
     id="text53">~21 sec/request (depends on API)</text>
  <!-- Arrow connecting last two analyzers to a merge point -->
  <!-- Performance note -->
  <!-- LEVEL 4: OUTPUT LAYER (Two parallel outputs) -->
  <rect
     x="128.85188"
     y="580.56641"
     width="886.79791"
     height="140.51764"
     fill="#f9f9f9"
     stroke="#2c3e50"
     stroke-width="2.48235"

     class="small-text"
     fill="#e74c3c"
     id="text60">metrics.duckdb</text>
  <text
     x="772"
     y="690"
     text-anchor="middle"
     class="small-text"
     fill="#e74c3c"
     id="text61">(Single Source of Truth)</text>

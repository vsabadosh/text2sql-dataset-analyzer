       y="449"
       text-anchor="start"
       class="tiny-text"
       id="text24">• function_in_where: Column functions in WHERE</text>
    <text
       x="460"
       y="466"
       text-anchor="start"
       class="tiny-text"
       id="text25">• leading_wildcard_like: LIKE '%pattern'</text>
    <text
       x="460"
       y="483"
       text-anchor="start"
       class="tiny-text"
       id="text26">• not_in_nullable: NOT IN with subquery</text>
    <text
       x="460"
       y="500"
       text-anchor="start"
       class="tiny-text"
       id="text27">• too_many_joins: 5+ JOIN operations</text>
    <text
       x="460"
       y="517"
       text-anchor="start"
       class="tiny-text"
       id="text28">• distinct_overuse: DISTINCT on 5+ columns</text>
    <text
       x="460"
       y="537"
       text-anchor="start"
       class="small-text"
       font-weight="bold"
       id="text29">Penalty: -10 points per occurrence</text>

    <text
       x="860"
       y="449"
       text-anchor="start"
       class="tiny-text"
       id="text34"
       style="stroke-width:1.02305">• redundant_distinct: DISTINCT with GROUP BY</text>
    <text
       x="860"
       y="466"
       text-anchor="start"
       class="tiny-text"
       id="text35"
       style="stroke-width:1.02305">• select_in_exists: Unnecessary columns in EXISTS</text>
    <text
       x="860"
       y="483"
       text-anchor="start"
       class="tiny-text"
       id="text36"
       style="stroke-width:1.02305">• union_instead_of_union_all: UNION vs ALL</text>
    <text
       x="860"
       y="500"
       text-anchor="start"
       class="tiny-text"
       id="text37"
       style="stroke-width:1.02305">• complex_or_conditions: 3+ OR predicates</text>
    <text
       x="860"
       y="520"
       text-anchor="start"
       class="small-text"
       font-weight="bold"
       id="text38"
       style="stroke-width:1.02305">Penalty: -3 points per occurrence</text>
    <text
       x="860"
       y="537"
       text-anchor="start"
       class="tiny-text"
       id="text39"
       style="stroke-width:1.02305">Suggestions for performance improvement</text>
    <text
       x="860"
       y="552"
       text-anchor="start"
       class="tiny-text"
       id="text40"
       style="stroke-width:1.02305">May be acceptable in specific contexts</text>
  </g>

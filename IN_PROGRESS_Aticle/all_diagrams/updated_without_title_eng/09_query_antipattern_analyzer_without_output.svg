     height="280"
     class="process-box"
     rx="8"
     id="rect8"
     ry="8" />
  <text
     x="650"
     y="299"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     font-size="15px"
     id="text9">🎯 Stage 2: Pattern Classification by Severity</text>
  <!-- Error Severity -->
  <g
     id="g19"
     transform="translate(0,-26)">
    <rect
       x="70"
       y="345"
       width="350"
       height="220"
       class="error-box"
       rx="5"
       id="rect9"
       ry="5" />
    <text
       x="245"
       y="370"
       text-anchor="middle"
       class="label"
       font-weight="bold"
       fill="#e74c3c"
       id="text10">🔴 Critical (Error Severity)</text>
    <text
       x="90"
       y="395"
       text-anchor="start"
       class="small-text"
       font-weight="bold"
       id="text11">Impact: Data safety violations</text>
    <text
       x="90"
       y="415"
       text-anchor="start"
       class="tiny-text"
       id="text12">• unsafe_update: UPDATE without WHERE</text>
    <text
       x="100"
       y="432"
       text-anchor="start"
       class="tiny-text"
       font-style="italic"
       id="text13">Modifies all table rows</text>
    <text
       x="90"
       y="455"
       text-anchor="start"
       class="tiny-text"
       id="text14">• unsafe_delete: DELETE without WHERE</text>
    <text
       x="100"
       y="472"
       text-anchor="start"
       class="tiny-text"
       font-style="italic"
       id="text15">Removes all table rows</text>
    <text
       x="90"
       y="495"
       text-anchor="start"
       class="small-text"
       font-weight="bold"
       id="text16">Penalty: -20 points per occurrence</text>
    <text
       x="90"
       y="515"
       text-anchor="start"
       class="tiny-text"
       id="text17">These patterns represent catastrophic</text>
    <text
       x="90"
       y="530"
       text-anchor="start"
       class="tiny-text"
       id="text18">errors that could destroy data integrity</text>
    <text
       x="90"
       y="545"
       text-anchor="start"
       class="tiny-text"
       id="text19">and require immediate correction</text>
  </g>

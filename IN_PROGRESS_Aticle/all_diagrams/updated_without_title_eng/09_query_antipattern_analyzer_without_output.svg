  <text
     x="370"
     y="630"
     text-anchor="start"
     class="small-text"
     id="text42">Weighted scoring algorithm: Score = 100 - (20×errors + 10×warnings + 3×info)</text>
  <text
     x="370"
     y="650"
     text-anchor="start"
     class="small-text"
     id="text43">• Zero antipatterns → 100 (perfect quality)</text>
  <text
     x="370"
     y="668"
     text-anchor="start"
     class="small-text"
     id="text44">• Multiple critical issues → 0 (unacceptable quality)</text>

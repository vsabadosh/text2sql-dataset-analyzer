     font-weight="bold"
     font-size="15px"
     id="text5">🔍 Stage 1: Rule-Based Detection Engine</text>
  <text
     x="270"
     y="208"
     text-anchor="start"
     class="small-text"
     id="text6">• 14 independent detection rules traverse AST in parallel</text>
  <text
     x="270"
     y="226"
     text-anchor="start"
     class="small-text"
     id="text7">• Each rule identifies specific antipattern through structural analysis</text>
  <text
     x="270"
     y="244"
     text-anchor="start"
     class="small-text"
     id="text8">• Detection operates on abstract syntax tree nodes (SELECT, WHERE, JOIN, etc.)</text>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 1400 1050"
   version="1.1"
   id="svg1"
   sodipodi:docname="06_llm_prompt_structure.svg"
   inkscape:version="1.4 (e7c3feb1, 2024-10-09)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview51"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="0.52419174"
     inkscape:cx="680.09466"
     inkscape:cy="508.40176"
     inkscape:window-width="1512"
     inkscape:window-height="850"
     inkscape:window-x="0"
     inkscape:window-y="38"
     inkscape:window-maximized="0"
     inkscape:current-layer="svg1" />
  <defs
     id="defs1">
    <style
       id="style1">
      .section-title { font-family: Arial, sans-serif; font-size: 15px; font-weight: bold; fill: #2c3e50; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; font-weight: 500; }
      .small-text { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
      .code-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #2c3e50; }
      .code-comment { font-family: 'Courier New', monospace; font-size: 9px; fill: #7f8c8d; font-style: italic; }
      .prompt-box { fill: #e8f4f8; stroke: #3498db; stroke-width: 3; }
      .input-box { fill: #fff3cd; stroke: #ffc107; stroke-width: 2; }
      .output-box { fill: #d4edda; stroke: #28a745; stroke-width: 2; }
      .verdict-box { fill: #f8f9fa; stroke: #6c757d; stroke-width: 2; }
    </style>
  </defs>
  <!-- Main Prompt Container -->
  <rect
     x="50"
     y="20"
     width="1300"
     height="1000"
     class="prompt-box"
     rx="10"
     id="rect1" />
  <!-- Section 1: Input Parameters -->
  <text
     x="70"
     y="50"
     class="section-title"
     id="text1">Input Parameters (Template Placeholders)</text>
  <!-- Dialect -->
  <rect
     x="80"
     y="65"
     width="600"
     height="55"
     class="input-box"
     rx="5"
     id="rect2" />
  <text
     x="100"
     y="85"
     class="label"
     id="text2">{{dialect}}</text>
  <text
     x="100"
     y="102"
     class="small-text"
     id="text3">Database SQL dialect specification</text>
  <text
     x="100"
     y="115"
     class="code-text"
     fill="#666"
     id="text4">Example: &quot;sqlite&quot;, &quot;postgresql&quot;, &quot;mysql&quot;</text>
  <!-- DDL Schema -->
  <rect
     x="700"
     y="65"
     width="600"
     height="55"
     class="input-box"
     rx="5"
     id="rect4" />
  <text
     x="720"
     y="85"
     class="label"
     id="text5">{{ddl_schema}}</text>
  <text
     x="720"
     y="102"
     class="small-text"
     id="text6">CREATE TABLE statements with example data</text>
  <text
     x="720"
     y="115"
     class="code-text"
     fill="#666"
     id="text7">Mode: &quot;full&quot; (all tables) or &quot;query_derived&quot; (referenced only)</text>
  <!-- Natural Question -->
  <rect
     x="80"
     y="135"
     width="600"
     height="55"
     class="input-box"
     rx="5"
     id="rect7" />
  <text
     x="100"
     y="155"
     class="label"
     id="text8">{{natural_question}}</text>
  <text
     x="100"
     y="172"
     class="small-text"
     id="text9">Natural language question from dataset</text>
  <text
     x="100"
     y="185"
     class="code-text"
     fill="#666"
     id="text10">Example: &quot;Show all students with grade above 90&quot;</text>
  <!-- SQL Query -->
  <rect
     x="700"
     y="135"
     width="600"
     height="55"
     class="input-box"
     rx="5"
     id="rect10" />
  <text
     x="720"
     y="155"
     class="label"
     id="text11">{{sql_to_revise}}</text>
  <text
     x="720"
     y="172"
     class="small-text"
     id="text12">SQL query to be evaluated</text>
  <text
     x="720"
     y="185"
     class="code-text"
     fill="#666"
     id="text13">Example: &quot;SELECT * FROM students WHERE grade &gt; 90&quot;</text>
  <!-- Separator -->
  <line
     x1="70"
     y1="215"
     x2="1330"
     y2="215"
     stroke="#3498db"
     stroke-width="2"
     stroke-dasharray="5,5"
     id="line13" />
  <!-- Section 2: Evaluation Instructions -->
  <text
     x="70"
     y="245"
     class="section-title"
     id="text14">Evaluation Criteria (From Prompt Template)</text>
  <rect
     x="80"
     y="260"
     width="1240"
     height="135"
     fill="#ffffff"
     stroke="#3498db"
     stroke-width="2"
     rx="5"
     id="rect14" />
  <text
     x="100"
     y="282"
     class="small-text"
     font-weight="bold"
     id="text15">Instructions to LLM:</text>
  <text
     x="120"
     y="305"
     class="small-text"
     id="text16">• Verify semantic correctness: Does the SQL correctly answer the question?</text>
  <text
     x="120"
     y="325"
     class="small-text"
     id="text17">• Check filters, joins, aggregation logic, GROUP BY, HAVING clauses</text>
  <text
     x="120"
     y="345"
     class="small-text"
     id="text18">• Consider NULL handling, empty-set behavior, DISTINCT vs duplicates</text>
  <text
     x="120"
     y="365"
     class="small-text"
     id="text19">• Validate ordering/limits and handling of ties if applicable</text>
  <text
     x="120"
     y="385"
     class="small-text"
     id="text20">• Do NOT comment on syntax, style, or performance — focus on semantics only</text>
  <!-- Separator -->
  <line
     x1="70"
     y1="415"
     x2="1330"
     y2="415"
     stroke="#3498db"
     stroke-width="2"
     stroke-dasharray="5,5"
     id="line20" />
  <!-- Section 3: Output Format -->
  <text
     x="70"
     y="445"
     class="section-title"
     id="text21">Required Output Format</text>
  <!-- Output specification box -->
  <rect
     x="80"
     y="460"
     width="1240"
     height="160"
     class="output-box"
     rx="5"
     id="rect21" />
  <text
     x="100"
     y="482"
     class="label"
     font-weight="bold"
     id="text22">Strict JSON Response (no prose, no code fences):</text>
  <rect
     x="120"
     y="495"
     width="1180"
     height="110"
     fill="#ffffff"
     stroke="#28a745"
     stroke-width="1"
     rx="3"
     id="rect22" />
  <text
     x="140"
     y="515"
     class="code-text"
     fill="#c7254e"
     id="text23">{</text>
  <text
     x="160"
     y="535"
     class="code-text"
     id="text24">  &quot;verdict&quot;: <tspan
   fill="#0066cc"
   id="tspan23">&quot;CORRECT&quot;</tspan>,</text>
  <text
     x="160"
     y="555"
     class="code-text"
     id="text25">  &quot;explanation&quot;: <tspan
   fill="#0066cc"
   id="tspan24">&quot;&quot;</tspan></text>
  <text
     x="160"
     y="575"
     class="code-comment"
     id="text26">  // Empty string for CORRECT; ≤200 chars for others</text>
  <text
     x="140"
     y="595"
     class="code-text"
     fill="#c7254e"
     id="text27">}</text>
  <!-- Separator -->
  <line
     x1="70"
     y1="640"
     x2="1330"
     y2="640"
     stroke="#3498db"
     stroke-width="2"
     stroke-dasharray="5,5"
     id="line27" />
  <!-- Section 4: Verdict Categories -->
  <text
     x="70"
     y="670"
     class="section-title"
     id="text28">Verdict Categories (Four-Label Classification)</text>
  <!-- CORRECT -->
  <rect
     x="80"
     y="690"
     width="620"
     height="115"
     class="verdict-box"
     rx="5"
     id="rect28" />
  <text
     x="100"
     y="715"
     class="label"
     font-weight="bold"
     fill="#28a745"
     id="text29">✓ CORRECT</text>
  <text
     x="120"
     y="738"
     class="small-text"
     id="text30"><tspan
   font-weight="bold"
   id="tspan29">When:</tspan> Query fully and accurately answers the question</text>
  <text
     x="140"
     y="755"
     class="small-text"
     id="text31">with no semantic issues</text>
  <text
     x="120"
     y="775"
     class="small-text"
     id="text32"><tspan
   font-weight="bold"
   id="tspan31">Explanation:</tspan> Must be empty string <tspan
   class="code-text"
   id="tspan32">&quot;&quot;</tspan></text>
  <text
     x="120"
     y="795"
     class="code-text"
     fill="#28a745"
     id="text33">{&quot;verdict&quot;:&quot;CORRECT&quot;,&quot;explanation&quot;:&quot;&quot;}</text>
  <!-- PARTIALLY_CORRECT -->
  <rect
     x="720"
     y="690"
     width="620"
     height="115"
     class="verdict-box"
     rx="5"
     id="rect33" />
  <text
     x="740"
     y="715"
     class="label"
     font-weight="bold"
     fill="#ffc107"
     id="text34">⚠ PARTIALLY_CORRECT</text>
  <text
     x="760"
     y="738"
     class="small-text"
     id="text35"><tspan
   font-weight="bold"
   id="tspan34">When:</tspan> Mostly correct but has minor issues:</text>
  <text
     x="780"
     y="755"
     class="small-text"
     id="text36">• Missing DISTINCT | Imprecise date boundaries</text>
  <text
     x="780"
     y="770"
     class="small-text"
     id="text37">• NULL edge cases | Non-deterministic GROUP BY</text>
  <text
     x="760"
     y="790"
     class="small-text"
     id="text38"><tspan
   font-weight="bold"
   id="tspan37">Explanation:</tspan> Single-line, ≤200 chars, specific issue</text>
  <!-- INCORRECT -->
  <rect
     x="80"
     y="820"
     width="620"
     height="115"
     class="verdict-box"
     rx="5"
     id="rect38" />
  <text
     x="100"
     y="845"
     class="label"
     font-weight="bold"
     fill="#dc3545"
     id="text39">✗ INCORRECT</text>
  <text
     x="120"
     y="868"
     class="small-text"
     id="text40"><tspan
   font-weight="bold"
   id="tspan39">When:</tspan> Fundamental semantic errors:</text>
  <text
     x="140"
     y="885"
     class="small-text"
     id="text41">• Wrong tables/columns | Missing/incorrect JOINs</text>
  <text
     x="140"
     y="900"
     class="small-text"
     id="text42">• Wrong aggregation logic | Incorrect WHERE clauses</text>
  <text
     x="140"
     y="915"
     class="small-text"
     id="text43">• Produces fundamentally wrong answer</text>
  <text
     x="120"
     y="930"
     class="small-text"
     id="text44"><tspan
   font-weight="bold"
   id="tspan43">Explanation:</tspan> Single-line, ≤200 chars, main error</text>
  <!-- UNANSWERABLE -->
  <rect
     x="720"
     y="820"
     width="620"
     height="115"
     class="verdict-box"
     rx="5"
     id="rect44" />
  <text
     x="740"
     y="845"
     class="label"
     font-weight="bold"
     fill="#6c757d"
     id="text45">? UNANSWERABLE</text>
  <text
     x="760"
     y="868"
     class="small-text"
     id="text46"><tspan
   font-weight="bold"
   id="tspan45">When:</tspan> Cannot be answered from schema:</text>
  <text
     x="780"
     y="885"
     class="small-text"
     id="text47">• Missing required tables/columns</text>
  <text
     x="780"
     y="900"
     class="small-text"
     id="text48">• Requires external data not in database</text>
  <text
     x="780"
     y="915"
     class="small-text"
     id="text49">• Ambiguous or contradictory question</text>
  <text
     x="760"
     y="930"
     class="small-text"
     id="text50"><tspan
   font-weight="bold"
   id="tspan49">Explanation:</tspan> Single-line, ≤200 chars, what's missing</text>
  <!-- Bottom note -->
  <rect
     x="80"
     y="950"
     width="1240"
     height="40"
     fill="#f8f9fa"
     stroke="#6c757d"
     stroke-width="1"
     rx="5"
     id="rect50" />
  <text
     x="700"
     y="973"
     text-anchor="middle"
     class="small-text"
     font-style="italic"
     id="text51">
    Verdict mapping for weighted aggregation: CORRECT=1.0, PARTIALLY_CORRECT=0.5, INCORRECT=0.0, UNANSWERABLE=0.0
  </text>
</svg>

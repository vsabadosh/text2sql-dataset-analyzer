<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1050" version="1.1">
  <defs>
    <style>
      .title { font: bold 18px sans-serif; fill: #333; }
      .subtitle { font: 14px sans-serif; fill: #666; }
      .section-title { font: bold 16px sans-serif; fill: #333; }
      .stage-title { font: bold 15px sans-serif; fill: #333; }
      .box-text { font: 13px sans-serif; fill: #333; }
      .small-text { font: 11px sans-serif; fill: #555; }
      .tiny-text { font: 10px sans-serif; fill: #666; }
      .code-text { font: 11px monospace; fill: #444; }
      .code-small { font: 9px monospace; fill: #555; }
      
      /* Boxes */
      .config-box { fill: #E8F4F8; stroke: #0284C7; stroke-width: 2; }
      .input-box { fill: #E3F2FD; stroke: #2196F3; stroke-width: 2; }
      .process-box { fill: #F5F5F5; stroke: #757575; stroke-width: 2; }
      .result-box { fill: #FFF8E1; stroke: #FFA000; stroke-width: 2; }
      .output-box { fill: #F3E5F5; stroke: #8E24AA; stroke-width: 2; }
      
      /* Severity colors for config */
      .critical-item { fill: #FFEBEE; stroke: #E53935; stroke-width: 1.5; }
      .high-item { fill: #FFF3E0; stroke: #FB8C00; stroke-width: 1.5; }
      .medium-item { fill: #E8F5E9; stroke: #43A047; stroke-width: 1.5; }
      .low-item { fill: #E0F2F1; stroke: #00897B; stroke-width: 1.5; }
      
      /* Arrows */
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-config { stroke: #0284C7; stroke-width: 2; fill: none; stroke-dasharray: 5,3; marker-end: url(#arrowhead-config); }
    </style>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
    
    <marker id="arrowhead-config" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0284C7"/>
    </marker>
  </defs>

  <!-- STAGE 1: Configuration Layer (Severity Classification is HERE) -->
  <g id="config-layer">
    <rect x="50" y="20" width="1300" height="340" rx="5" class="config-box"/>
    <text x="700" y="45" text-anchor="middle" class="section-title">📋 Stage 1: Configuration (Severity Classification Defined Here)</text>
    <text x="700" y="65" text-anchor="middle" class="small-text" fill="#0284C7">Antipatterns are pre-classified by severity in dialect-specific configuration</text>
    
    <!-- Critical severity config -->
    <g id="critical-config">
      <rect x="80" y="85" width="300" height="155" rx="5" class="critical-item"/>
      <text x="230" y="108" text-anchor="middle" class="stage-title">🔴 Critical Severity</text>
      <text x="95" y="128" class="small-text" font-weight="bold" fill="#C62828">Impact: Always wrong results / Data safety</text>
      <text x="95" y="145" class="small-text" fill="#C62828">Penalty: −30 points per instance</text>
      
      <text x="95" y="168" class="code-small">• null_comparison_equals</text>
      <text x="95" y="183" class="code-small">• missing_group_by</text>
      <text x="95" y="198" class="code-small">• unsafe_update_delete</text>
      <text x="95" y="213" class="code-small">• cartesian_product</text>
      
      <text x="95" y="232" class="tiny-text" style="font-style: italic;" fill="#C62828">Example: WHERE age = NULL</text>
    </g>
    
    <!-- High severity config -->
    <g id="high-config">
      <rect x="400" y="85" width="300" height="155" rx="5" class="high-item"/>
      <text x="550" y="108" text-anchor="middle" class="stage-title">⚠️ High Severity</text>
      <text x="415" y="128" class="small-text" font-weight="bold" fill="#E65100">Impact: Subtle semantic errors</text>
      <text x="415" y="145" class="small-text" fill="#E65100">Penalty: −15 points per instance</text>
      
      <text x="415" y="168" class="code-small">• not_in_nullable</text>
      <text x="415" y="183" class="code-small">• implicit_join</text>
      
      <text x="415" y="210" class="tiny-text" style="font-style: italic;" fill="#E65100">Example: WHERE id NOT IN</text>
      <text x="415" y="223" class="tiny-text" style="font-style: italic;" fill="#E65100">(SELECT user_id FROM t)</text>
    </g>
    
    <!-- Medium severity config -->
    <g id="medium-config">
      <rect x="720" y="85" width="300" height="155" rx="5" class="medium-item"/>
      <text x="870" y="108" text-anchor="middle" class="stage-title">🔵 Medium Severity</text>
      <text x="735" y="128" class="small-text" font-weight="bold" fill="#2E7D32">Impact: Performance issues</text>
      <text x="735" y="145" class="small-text" fill="#2E7D32">Penalty: −5 points per instance</text>
      
      <text x="735" y="168" class="code-small">• function_in_where</text>
      <text x="735" y="183" class="code-small">• correlated_subquery</text>
      <text x="735" y="198" class="code-small">• leading_wildcard_like</text>
      <text x="735" y="213" class="code-small">• redundant_distinct</text>
      
      <text x="735" y="232" class="tiny-text" style="font-style: italic;" fill="#2E7D32">Example: WHERE UPPER(name)='X'</text>
    </g>
    
    <!-- Low severity config -->
    <g id="low-config">
      <rect x="1040" y="85" width="280" height="155" rx="5" class="low-item"/>
      <text x="1180" y="108" text-anchor="middle" class="stage-title">🟢 Low Severity</text>
      <text x="1055" y="128" class="small-text" font-weight="bold" fill="#00695C">Impact: Style preferences</text>
      <text x="1055" y="145" class="small-text" fill="#00695C">Penalty: −2 points per instance</text>
      
      <text x="1055" y="168" class="code-small">• select_star</text>
      
      <text x="1055" y="195" class="tiny-text" style="font-style: italic;" fill="#00695C">Example: SELECT * FROM users</text>
      <text x="1055" y="210" class="tiny-text" fill="#00695C">Context-dependent:</text>
      <text x="1055" y="223" class="tiny-text" fill="#00695C">OK in research, avoid in prod</text>
    </g>
    
    <!-- Dialect selection note -->
    <rect x="80" y="255" width="1240" height="90" rx="4" fill="white" stroke="#94A3B8" stroke-width="1"/>
    <text x="700" y="278" text-anchor="middle" class="box-text" font-weight="bold">Dialect-Specific Configuration</text>
    <text x="100" y="300" class="small-text">• Each SQL dialect (SQLite, PostgreSQL, MySQL, ...) can have different antipattern-to-severity mappings</text>
    <text x="100" y="318" class="small-text">• Example: <tspan class="code-small">implicit_join</tspan> may be "high" in SQLite but "medium" in PostgreSQL</text>
    <text x="100" y="336" class="small-text">• Configuration file: <tspan class="code-small">pipeline.yaml → antipatterns → {dialect} → {severity} → [pattern_list]</tspan></text>
  </g>

  <!-- Arrow from config -->
  <path d="M 700 360 L 700 395" class="arrow-config"/>
  <text x="780" y="382" class="tiny-text" fill="#0284C7" font-weight="bold">severity mapping loaded</text>

  <!-- STAGE 2: Input + Detection (side by side) -->
  <g id="detection-stage">
    <rect x="50" y="395" width="1300" height="130" rx="5" class="process-box"/>
    <text x="700" y="420" text-anchor="middle" class="section-title">⚙️ Stage 2: Detection Engine</text>
    
    <!-- Input -->
    <rect x="80" y="435" width="350" height="75" rx="4" class="input-box"/>
    <text x="255" y="458" text-anchor="middle" class="box-text" font-weight="bold">Input: SQL Query</text>
    <text x="255" y="478" text-anchor="middle" class="code-small" fill="#1976D2">SELECT * FROM users WHERE age = NULL</text>
    <text x="255" y="498" text-anchor="middle" class="tiny-text">Parsed into AST using sqlglot</text>
    
    <!-- Arrow within stage -->
    <path d="M 430 472 L 480 472" class="arrow"/>
    
    <!-- Detection process -->
    <rect x="480" y="435" width="840" height="75" rx="4" fill="white" stroke="#757575" stroke-width="1"/>
    <text x="900" y="458" text-anchor="middle" class="box-text" font-weight="bold">Config-Driven Pattern Detection</text>
    <text x="500" y="478" class="small-text">1. For each pattern in config: traverse AST to detect occurrence</text>
    <text x="500" y="495" class="small-text">2. When pattern found → assign severity from config lookup (not computed!)</text>
    <text x="500" y="512" class="small-text">3. Collect: List[{pattern, severity, location, message}]</text>
  </g>

  <!-- Arrow to results -->
  <path d="M 700 525 L 700 560" class="arrow"/>
  <text x="780" y="548" class="tiny-text" fill="#666">detected antipatterns</text>

  <!-- STAGE 3: Detection Results -->
  <g id="results-stage">
    <rect x="50" y="560" width="1300" height="175" rx="5" class="result-box"/>
    <text x="700" y="585" text-anchor="middle" class="section-title">📋 Stage 3: Detection Results (Grouped by Pre-Defined Severity)</text>
    <text x="700" y="603" text-anchor="middle" class="tiny-text" fill="#E65100">Severity was determined by config, not by this stage</text>
    
    <!-- Result boxes showing what was detected -->
    <g id="results-critical">
      <rect x="80" y="615" width="295" height="100" rx="4" fill="#FFEBEE" stroke="#E53935" stroke-width="1"/>
      <text x="227.5" y="638" text-anchor="middle" class="box-text" font-weight="bold" fill="#C62828">🔴 Critical Found: 2</text>
      <text x="95" y="658" class="code-small">• null_comparison_equals (line 3)</text>
      <text x="95" y="675" class="code-small">• select_star (line 1)</text>
      <text x="95" y="700" class="tiny-text" fill="#C62828">Total penalty: −60 points</text>
    </g>
    
    <g id="results-high">
      <rect x="395" y="615" width="295" height="100" rx="4" fill="#FFF3E0" stroke="#FB8C00" stroke-width="1"/>
      <text x="542.5" y="638" text-anchor="middle" class="box-text" font-weight="bold" fill="#E65100">⚠️ High Found: 0</text>
      <text x="410" y="665" class="small-text" fill="#E65100">No high severity patterns detected</text>
      <text x="410" y="700" class="tiny-text" fill="#E65100">Total penalty: 0 points</text>
    </g>
    
    <g id="results-medium">
      <rect x="710" y="615" width="295" height="100" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="1"/>
      <text x="857.5" y="638" text-anchor="middle" class="box-text" font-weight="bold" fill="#2E7D32">🔵 Medium Found: 0</text>
      <text x="725" y="665" class="small-text" fill="#2E7D32">No medium severity patterns detected</text>
      <text x="725" y="700" class="tiny-text" fill="#2E7D32">Total penalty: 0 points</text>
    </g>
    
    <g id="results-low">
      <rect x="1025" y="615" width="295" height="100" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
      <text x="1172.5" y="638" text-anchor="middle" class="box-text" font-weight="bold" fill="#00695C">🟢 Low Found: 1</text>
      <text x="1040" y="658" class="code-small">• select_star (line 1)</text>
      <text x="1040" y="700" class="tiny-text" fill="#00695C">Total penalty: −2 points</text>
    </g>
  </g>

  <!-- Arrow to scoring -->
  <path d="M 700 735 L 700 770" class="arrow"/>

  <!-- STAGE 4: Quality Score Computation -->
  <g id="scoring-stage">
    <rect x="200" y="770" width="1000" height="95" rx="5" class="output-box"/>
    <text x="700" y="795" text-anchor="middle" class="section-title">📊 Stage 4: Quality Score Computation</text>
    
    <text x="230" y="820" class="box-text">Formula:</text>
    <text x="300" y="820" class="code-text">Score = 100 − Σ(penalty × count)</text>
    <text x="230" y="842" class="box-text">Example:</text>
    <text x="300" y="842" class="code-text">Score = 100 − (30×1 + 15×0 + 5×0 + 2×1) = 100 − 32 = 68</text>
    <text x="230" y="858" class="tiny-text" style="font-style: italic;">Penalties per severity: critical=30, high=15, medium=5, low=2 (defined in config)</text>
  </g>

  <!-- Arrow to classification -->
  <path d="M 700 865 L 700 900" class="arrow"/>

  <!-- STAGE 5: Quality Level Classification -->
  <g id="quality-classification">
    <rect x="100" y="900" width="1200" height="115" rx="5" fill="#F3E5F5" stroke="#8E24AA" stroke-width="3"/>
    <text x="700" y="925" text-anchor="middle" class="section-title">📈 Stage 5: Quality Level Classification</text>
    
    <g id="excellent">
      <rect x="140" y="945" width="240" height="55" rx="4" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2"/>
      <text x="260" y="968" text-anchor="middle" class="box-text" font-weight="bold">Excellent</text>
      <text x="260" y="985" text-anchor="middle" class="small-text">Score: 90–100</text>
    </g>
    
    <g id="good">
      <rect x="410" y="945" width="240" height="55" rx="4" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2"/>
      <text x="530" y="968" text-anchor="middle" class="box-text" font-weight="bold">Good</text>
      <text x="530" y="985" text-anchor="middle" class="small-text">Score: 70–89</text>
    </g>
    
    <g id="fair">
      <rect x="680" y="945" width="240" height="55" rx="4" fill="#FFE0B2" stroke="#FF9800" stroke-width="2"/>
      <text x="800" y="968" text-anchor="middle" class="box-text" font-weight="bold">Fair ← Score: 68</text>
      <text x="800" y="985" text-anchor="middle" class="small-text">Score: 50–69</text>
    </g>
    
    <g id="poor">
      <rect x="950" y="945" width="240" height="55" rx="4" fill="#FFCDD2" stroke="#F44336" stroke-width="2"/>
      <text x="1070" y="968" text-anchor="middle" class="box-text" font-weight="bold">Poor</text>
      <text x="1070" y="985" text-anchor="middle" class="small-text">Score: 0–49</text>
    </g>
  </g>

  <!-- Footer note -->
  <text x="700" y="1040" text-anchor="middle" class="tiny-text" fill="#94A3B8" style="font-style: italic;">
    Key insight: Severity classification is defined in configuration, not computed at runtime. Detection only looks up pre-assigned severities.
  </text>
</svg>

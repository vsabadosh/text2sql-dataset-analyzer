<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #4a4a4a; }
      .label { font-family: Arial, sans-serif; font-size: 13px; fill: #2c3e50; font-weight: 500; }
      .small-text { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
      .main-box { fill: #e8f4f8; stroke: #3498db; stroke-width: 3; }
      .component { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
      .voter-box { fill: #9b59b6; stroke: #8e44ad; stroke-width: 2; }
      .result-box { fill: #2ecc71; stroke: #27ae60; stroke-width: 2; }
      .arrow { stroke: #2c3e50; stroke-width: 2; fill: none; marker-end: url(#arrowhead3); }
      .code-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #2c3e50; }
    </style>
    <marker id="arrowhead3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2c3e50" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title">Архітектура Semantic LLM Judge Analyzer</text>
  <text x="600" y="50" text-anchor="middle" class="subtitle">Мульти-модельна система консенсусного голосування для семантичної валідації</text>
  
  <!-- Input Data -->
  <rect x="250" y="80" width="700" height="100" class="main-box" rx="8"/>
  <text x="600" y="105" text-anchor="middle" class="label" font-weight="bold">Вхідні дані (DataItem)</text>
  <text x="380" y="130" text-anchor="start" class="code-text">question: "Show all students with grade above 90"</text>
  <text x="380" y="148" text-anchor="start" class="code-text">sql: "SELECT * FROM students WHERE grade > 90"</text>
  <text x="380" y="166" text-anchor="start" class="code-text">dbId: "university"</text>
  
  <!-- Arrow down -->
  <path d="M 600 180 L 600 220" class="arrow"/>
  
  <!-- Step 1: Smart DDL Generation (with embedded example) -->
  <rect x="100" y="220" width="1000" height="160" class="component" rx="8"/>
  <text x="600" y="245" text-anchor="middle" class="label" fill="white" font-weight="bold">КРОК 1: Smart DDL Generation (DbManager)</text>
  
  <!-- Left side: description -->
  <text x="130" y="270" text-anchor="start" class="small-text" fill="white">1. Parse SQL → Extract referenced tables</text>
  <text x="130" y="290" text-anchor="start" class="small-text" fill="white">2. Query DB schema for those tables only</text>
  <text x="130" y="310" text-anchor="start" class="small-text" fill="white">3. Sample example data (default: 2 per column)</text>
  <text x="130" y="330" text-anchor="start" class="small-text" fill="white">4. Format CREATE TABLE with inline examples</text>
  <text x="130" y="355" text-anchor="start" class="small-text" fill="white" font-style="italic">→ Result: Optimized DDL with examples</text>
  
  <!-- Right side: embedded DDL example -->
  <rect x="520" y="265" width="550" height="105" fill="white" stroke="#f39c12" stroke-width="2" rx="5"/>
  <text x="795" y="285" text-anchor="middle" class="small-text" font-weight="bold" fill="#f39c12">Згенерований DDL</text>
  <text x="540" y="302" text-anchor="start" class="code-text">CREATE TABLE students (</text>
  <text x="540" y="317" text-anchor="start" class="code-text">  student_id INTEGER PRIMARY KEY,</text>
  <text x="540" y="332" text-anchor="start" class="code-text">  name VARCHAR(100), -- Examples: 'Alice', 'Bob'</text>
  <text x="540" y="347" text-anchor="start" class="code-text">  grade INTEGER -- Examples: 85, 92</text>
  <text x="540" y="362" text-anchor="start" class="code-text">);</text>
  
  <!-- Arrow down -->
  <path d="M 600 380 L 600 420" class="arrow"/>
  
  <!-- Step 2: Prompt Resolution (with embedded example) -->
  <rect x="100" y="420" width="1000" height="140" class="component" rx="8"/>
  <text x="600" y="445" text-anchor="middle" class="label" fill="white" font-weight="bold">КРОК 2: Prompt Template Resolution</text>
  
  <!-- Left side: description -->
  <text x="130" y="470" text-anchor="start" class="small-text" fill="white">Fill template with parameters:</text>
  <text x="130" y="490" text-anchor="start" class="code-text" fill="white">• {{question}} ← input DataItem.question</text>
  <text x="130" y="507" text-anchor="start" class="code-text" fill="white">• {{sql}} ← input DataItem.sql</text>
  <text x="130" y="524" text-anchor="start" class="code-text" fill="white">• {{ddl_schema}} ← Smart DDL from КРОК 1</text>
  <text x="130" y="545" text-anchor="start" class="small-text" fill="white" font-style="italic">→ Result: Complete prompt ready for LLM</text>
  
  <!-- Right side: embedded prompt example -->
  <rect x="520" y="475" width="550" height="75" fill="white" stroke="#e8f8f5" stroke-width="2" rx="5"/>
  <text x="795" y="495" text-anchor="middle" class="small-text" font-weight="bold">Приклад фінального промпту</text>
  <text x="540" y="512" text-anchor="start" class="code-text" font-size="9px">"Does this SQL correctly answer:</text>
  <text x="540" y="525" text-anchor="start" class="code-text" font-size="9px">Question: Show all students with grade above 90</text>
  <text x="540" y="538" text-anchor="start" class="code-text" font-size="9px">SQL: SELECT * FROM students WHERE grade > 90</text>
  
  <!-- Arrow down -->
  <path d="M 600 560 L 600 600" class="arrow"/>
  
  <!-- Step 3: Multi-Voter System -->
  <rect x="50" y="600" width="1100" height="230" class="main-box" rx="8"/>
  <text x="600" y="625" text-anchor="middle" class="label" font-weight="bold" font-size="16px">КРОК 3: Multi-Voter Consensus System (Паралельні виклики з готовим промптом)</text>
  
  <!-- Voter 1: OpenAI -->
  <rect x="80" y="645" width="230" height="165" class="voter-box" rx="8"/>
  <text x="195" y="670" text-anchor="middle" class="label" fill="white" font-weight="bold">🤖 OpenAI Provider</text>
  <text x="195" y="690" text-anchor="middle" class="small-text" fill="white">Model: gpt-4o</text>
  <text x="195" y="708" text-anchor="middle" class="small-text" fill="white">Temperature: 0.0</text>
  <text x="195" y="726" text-anchor="middle" class="small-text" fill="white">Weight: 1.0</text>
  <rect x="100" y="740" width="190" height="55" fill="white" rx="5"/>
  <text x="195" y="758" text-anchor="middle" class="code-text">Response:</text>
  <text x="195" y="772" text-anchor="middle" class="code-text">verdict: "CORRECT"</text>
  <text x="195" y="786" text-anchor="middle" class="code-text">score: 0.8</text>
  
  <!-- Voter 2: Anthropic -->
  <rect x="330" y="645" width="230" height="165" class="voter-box" rx="8"/>
  <text x="445" y="670" text-anchor="middle" class="label" fill="white" font-weight="bold">🧠 Anthropic Provider</text>
  <text x="445" y="690" text-anchor="middle" class="small-text" fill="white">Model: claude-3-opus</text>
  <text x="445" y="708" text-anchor="middle" class="small-text" fill="white">Temperature: 0.0</text>
  <text x="445" y="726" text-anchor="middle" class="small-text" fill="white">Weight: 1.0</text>
  <rect x="350" y="740" width="190" height="55" fill="white" rx="5"/>
  <text x="445" y="758" text-anchor="middle" class="code-text">Response:</text>
  <text x="445" y="772" text-anchor="middle" class="code-text">verdict: "CORRECT"</text>
  <text x="445" y="786" text-anchor="middle" class="code-text">score: 0.8</text>
  
  <!-- Voter 3: Gemini -->
  <rect x="580" y="645" width="230" height="165" class="voter-box" rx="8"/>
  <text x="695" y="670" text-anchor="middle" class="label" fill="white" font-weight="bold">✨ Gemini Provider</text>
  <text x="695" y="690" text-anchor="middle" class="small-text" fill="white">Model: gemini-2.5-pro</text>
  <text x="695" y="708" text-anchor="middle" class="small-text" fill="white">Temperature: 0.0</text>
  <text x="695" y="726" text-anchor="middle" class="small-text" fill="white">Weight: 1.0</text>
  <rect x="600" y="740" width="190" height="55" fill="white" rx="5"/>
  <text x="695" y="758" text-anchor="middle" class="code-text">Response:</text>
  <text x="695" y="772" text-anchor="middle" class="code-text">verdict: "CORRECT"</text>
  <text x="695" y="786" text-anchor="middle" class="code-text">score: 0.8</text>
  
  <!-- Voter 4: Ollama (Local) -->
  <rect x="830" y="645" width="230" height="165" class="voter-box" rx="8"/>
  <text x="945" y="670" text-anchor="middle" class="label" fill="white" font-weight="bold">🦙 Ollama Provider</text>
  <text x="945" y="690" text-anchor="middle" class="small-text" fill="white">Model: llama3.1:70b</text>
  <text x="945" y="708" text-anchor="middle" class="small-text" fill="white">Temperature: 0.0</text>
  <text x="945" y="726" text-anchor="middle" class="small-text" fill="white">Weight: 0.8 (локальна)</text>
  <rect x="850" y="740" width="190" height="55" fill="white" rx="5"/>
  <text x="945" y="758" text-anchor="middle" class="code-text">Response:</text>
  <text x="945" y="772" text-anchor="middle" class="code-text">verdict: "PARTIALLY"</text>
  <text x="945" y="786" text-anchor="middle" class="code-text">score: 0.6</text>
  
  <!-- Arrow down -->
  <path d="M 600 830 L 600 860" class="arrow"/>
  
  <!-- Step 4: Aggregation -->
  <rect x="200" y="860" width="800" height="70" class="result-box" rx="8"/>
  <text x="600" y="885" text-anchor="middle" class="label" fill="white" font-weight="bold" font-size="16px">КРОК 4: Зважене голосування та визначення консенсусу</text>
  <text x="250" y="905" text-anchor="start" class="small-text" fill="white">Weighted votes: CORRECT (3 × 1.0) + PARTIALLY (1 × 0.8) = 3.8 / 4.8 = 79%</text>
  <text x="250" y="920" text-anchor="start" class="small-text" fill="white">Majority verdict: CORRECT ✓ | Consensus: Majority | Unanimous: No</text>
</svg>

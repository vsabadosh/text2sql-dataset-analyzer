<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1412" height="1380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title-main { font-family: Arial, sans-serif; font-size: 32px; font-weight: bold; fill: #1a1a1a; }
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
      .label { font-family: Arial, sans-serif; font-size: 16px; fill: #2c3e50; font-weight: 500; }
      .text { font-family: Arial, sans-serif; font-size: 14px; fill: #34495e; }
      .small-text { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
      .code-text { font-family: 'Courier New', monospace; font-size: 13px; fill: #2c3e50; }
      .box-dataset { fill: #e8f4fd; stroke: #2980b9; stroke-width: 3; }
      .box-methods { fill: #fff9e6; stroke: #f39c12; stroke-width: 3; }
      .box-execution { fill: #e8f8f5; stroke: #27ae60; stroke-width: 3; }
      .box-warning { fill: #fdecea; stroke: #e74c3c; stroke-width: 3; }
      .box-white { fill: white; stroke: #7f8c8d; stroke-width: 2; }
      .box-method { fill: #f8f9fa; stroke: #6c757d; stroke-width: 2; }
    </style>
  </defs>

  <!-- Main Title -->
  <text x="706" y="50" text-anchor="middle" class="title-main">TRAINING DATASET</text>

  <!-- Dataset Section -->
  <rect x="50" y="80" width="1312" height="420" rx="10" class="box-dataset"/>
  
  <!-- Example -->
  <text x="100" y="120" class="subtitle">Example:</text>
  <text x="100" y="150" class="label">Natural language question:</text>
  <text x="120" y="180" class="text">"Show all students with grade higher than 90"</text>
  
  <text x="100" y="220" class="label">Database schema (with comments and examples):</text>
  <rect x="120" y="235" width="1200" height="140" rx="5" class="box-white"/>
  <text x="140" y="260" class="code-text">CREATE TABLE students (</text>
  <text x="160" y="285" class="code-text">  student_id INTEGER PRIMARY KEY,  -- Unique identifier</text>
  <text x="160" y="310" class="code-text">  name VARCHAR(100),               -- Student name</text>
  <text x="160" y="335" class="code-text">  grade INTEGER                    -- Grade (0-100)</text>
  <text x="140" y="360" class="code-text">)</text>
  
  <text x="100" y="405" class="label">Target SQL query:</text>
  <rect x="120" y="415" width="1200" height="40" rx="5" class="box-white"/>
  <text x="140" y="442" class="code-text">SELECT name, grade FROM students WHERE grade &gt; 90</text>
  
  <text x="100" y="485" class="small-text" font-weight="bold">Corpus: 10,000+ such examples</text>

  <!-- Methods Section -->
  <rect x="50" y="530" width="1312" height="330" rx="10" class="box-methods"/>
  <text x="706" y="565" text-anchor="middle" class="title">MODEL ADAPTATION METHODS</text>
  
  <!-- Fine-tuning -->
  <rect x="100" y="590" width="580" height="240" rx="8" class="box-method"/>
  <text x="390" y="625" text-anchor="middle" class="subtitle">FINE-TUNING</text>
  <text x="130" y="660" class="text">✓ Training the entire model</text>
  <text x="130" y="690" class="text">• 10,000+ examples needed</text>
  <text x="130" y="720" class="text">• Epochs: 3-10</text>
  <text x="130" y="750" class="text">• GPU cluster required</text>
  <text x="130" y="780" class="text">• Days/weeks of training</text>
  
  <!-- Few-shot -->
  <rect x="720" y="590" width="600" height="240" rx="8" class="box-method"/>
  <text x="1020" y="625" text-anchor="middle" class="subtitle">FEW-SHOT LEARNING</text>
  <text x="750" y="660" class="text">✓ No model training needed</text>
  <text x="750" y="690" class="text">• 3-5 examples in prompt</text>
  <text x="750" y="720" class="text">• In-context learning</text>
  <text x="750" y="750" class="text">• Faster application</text>
  <text x="750" y="780" class="text">• Seconds/minutes</text>
  
  <!-- Base Models -->
  <text x="100" y="845" class="label" font-weight="bold">Base Models:</text>
  <text x="240" y="845" class="text">GPT-4, Claude 3.5, Gemini 2.0, Llama 3, Qwen</text>

  <!-- Execution Section -->
  <rect x="50" y="890" width="1312" height="200" rx="10" class="box-execution"/>
  <text x="706" y="925" text-anchor="middle" class="title">EXECUTION (Inference)</text>
  
  <text x="100" y="965" class="label">For user: "Top 3 students by grade" + DB Schema</text>
  <text x="100" y="1005" class="text">🤖 LLM (adapted) → Prompt engineering → SQL generation</text>
  
  <rect x="120" y="1020" width="1200" height="50" rx="5" class="box-white"/>
  <text x="140" y="1053" class="code-text">SELECT name, grade FROM students ORDER BY grade DESC LIMIT 3</text>

  <!-- Critical Dependency Section -->
  <rect x="50" y="1120" width="1312" height="220" rx="10" class="box-warning"/>
  <text x="706" y="1155" text-anchor="middle" class="title">CRITICAL DEPENDENCY: DATASET QUALITY</text>
  
  <text x="100" y="1195" class="text" font-weight="bold">Incorrect dataset → Poor training → Wrong SQL</text>
  
  <text x="100" y="1235" class="label">Types of errors in datasets:</text>
  <text x="120" y="1265" class="text">• Structural: non-existent FK tables, duplicate columns</text>
  <text x="120" y="1295" class="text">• Semantic: SQL is syntactically OK, but logically ≠ question</text>

</svg>



<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #4a4a4a; }
      .label { font-family: Arial, sans-serif; font-size: 13px; fill: #2c3e50; font-weight: 500; }
      .small-text { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
      .code-text { font-family: 'Courier New', monospace; font-size: 11px; fill: #2c3e50; }
      .input-box { fill: #e8f4f8; stroke: #3498db; stroke-width: 3; }
      .step-box { fill: #fff; stroke: #3498db; stroke-width: 2; }
      .decision-box { fill: #fef9e7; stroke: #f39c12; stroke-width: 3; }
      .success-box { fill: #d5f4e6; stroke: #27ae60; stroke-width: 3; }
      .error-box { fill: #fadbd8; stroke: #e74c3c; stroke-width: 3; }
      .output-box { fill: #d5f4e6; stroke: #27ae60; stroke-width: 3; }
      .arrow { stroke: #2c3e50; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .yes-arrow { stroke: #27ae60; stroke-width: 3; fill: none; marker-end: url(#yes-arrowhead); }
      .no-arrow { stroke: #e74c3c; stroke-width: 3; fill: none; marker-end: url(#no-arrowhead); }
      .db-icon { fill: #3498db; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2c3e50" />
    </marker>
    <marker id="yes-arrowhead" markerWidth="12" markerHeight="12" refX="11" refY="3" orient="auto">
      <polygon points="0 0, 12 3, 0 6" fill="#27ae60" />
    </marker>
    <marker id="no-arrowhead" markerWidth="12" markerHeight="12" refX="11" refY="3" orient="auto">
      <polygon points="0 0, 12 3, 0 6" fill="#e74c3c" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title">DbIdentity Normalizer: Гарантоване заповнення dbId</text>
  <text x="600" y="50" text-anchor="middle" class="subtitle">Перевірка здоров'я існуючих БД або автоматичне створення з DDL схем</text>
  
  <!-- Input -->
  <rect x="450" y="80" width="300" height="100" class="input-box" rx="8"/>
  <text x="600" y="105" text-anchor="middle" class="label" font-weight="bold" font-size="15px">📥 Вхідні дані (DataItem)</text>
  <text x="470" y="130" text-anchor="start" class="code-text">db_id: "university"</text>
  <text x="470" y="145" text-anchor="start" class="code-text">question: "Show all students"</text>
  <text x="470" y="160" text-anchor="start" class="code-text">sql: "SELECT * FROM students"</text>
  <text x="470" y="175" text-anchor="start" class="code-text" fill="#e74c3c">schema: "CREATE TABLE ..." (optional)</text>
  
  <!-- Arrow down -->
  <path d="M 600 180 L 600 220" class="arrow"/>
  
  <!-- Step 1: Check DB Exists -->
  <rect x="425" y="220" width="350" height="100" class="step-box" rx="8"/>
  <text x="600" y="245" text-anchor="middle" class="label" font-weight="bold" font-size="15px">🔍 Крок 1: Перевірка здоров'я БД</text>
  <text x="445" y="270" text-anchor="start" class="code-text">if item.dbId is not None:</text>
  <text x="465" y="288" text-anchor="start" class="code-text">health, error = db_manager</text>
  <text x="475" y="306" text-anchor="start" class="code-text">.status(item.dbId)</text>
  
  <!-- Arrow down to decision -->
  <path d="M 600 320 L 600 360" class="arrow"/>
  
  <!-- Decision 1: DB Exists? -->
  <path d="M 600 360 L 750 410 L 600 460 L 450 410 Z" class="decision-box"/>
  <text x="600" y="405" text-anchor="middle" class="label" font-weight="bold">dbId існує і</text>
  <text x="600" y="423" text-anchor="middle" class="label" font-weight="bold">health == "ok"?</text>
  
  <!-- YES path (DB exists) -->
  <path d="M 750 410 L 900 410" class="yes-arrow"/>
  <text x="820" y="400" text-anchor="middle" class="label" fill="#27ae60" font-weight="bold">ТАК ✓</text>
  
  <rect x="900" y="370" width="250" height="80" class="success-box" rx="8"/>
  <text x="1025" y="395" text-anchor="middle" class="label" font-weight="bold">✅ БД готова</text>
  <text x="920" y="420" text-anchor="start" class="small-text">БД існує і здорова</text>
  <text x="920" y="438" text-anchor="start" class="small-text">item.dbId залишається без змін</text>
  
  <!-- Arrow to output -->
  <path d="M 1025 450 L 1025 690 L 750 690" class="arrow"/>
  
  <!-- NO path (DB doesn't exist) -->
  <path d="M 450 410 L 300 410" class="no-arrow"/>
  <text x="380" y="400" text-anchor="middle" class="label" fill="#e74c3c" font-weight="bold">НІ ✗</text>
  
  <!-- Decision 2: Has DDL? -->
  <rect x="50" y="370" width="250" height="100" class="decision-box" rx="8"/>
  <text x="175" y="395" text-anchor="middle" class="label" font-weight="bold">Є DDL схема?</text>
  <text x="70" y="420" text-anchor="start" class="small-text">item.schema is not None</text>
  <text x="70" y="438" text-anchor="start" class="code-text">if item.schema:</text>
  <text x="90" y="456" text-anchor="start" class="code-text">  # можна створити БД</text>
  
  <!-- YES path (Has DDL) - create DB -->
  <path d="M 175 470 L 175 520" class="yes-arrow"/>
  <text x="190" y="500" text-anchor="start" class="label" fill="#27ae60" font-weight="bold">ТАК ✓</text>
  
  <rect x="50" y="520" width="250" height="120" class="success-box" rx="8"/>
  <text x="175" y="545" text-anchor="middle" class="label" font-weight="bold">🔨 Генерація dbId + створення БД</text>
  <text x="70" y="565" text-anchor="start" class="small-text">1. dbId = hash(schema)</text>
  <text x="70" y="580" text-anchor="start" class="small-text">2. Створення БД з DDL</text>
  <text x="70" y="600" text-anchor="start" class="code-text">item.dbId = db_manager</text>
  <text x="80" y="615" text-anchor="start" class="code-text">.identity_from_schema(</text>
  <text x="90" y="630" text-anchor="start" class="code-text">item.schema)</text>
  
  <!-- Arrow to success metadata -->
  <path d="M 175 640 L 175 690 L 450 690" class="arrow"/>
  
  <!-- NO path (No DDL) - error -->
  <path d="M 175 370 L 175 250" class="no-arrow"/>
  <text x="190" y="310" text-anchor="start" class="label" fill="#e74c3c" font-weight="bold">НІ ✗</text>
  
  <rect x="50" y="100" width="250" height="120" class="error-box" rx="8"/>
  <text x="175" y="125" text-anchor="middle" class="label" font-weight="bold">❌ ValueError</text>
  <text x="70" y="150" text-anchor="start" class="small-text">raise ValueError(</text>
  <text x="80" y="168" text-anchor="start" class="small-text">"both dbId and schema"</text>
  <text x="80" y="186" text-anchor="start" class="small-text">"are missing"</text>
  <text x="70" y="204" text-anchor="start" class="small-text">)</text>
  <text x="175" y="215" text-anchor="middle" class="small-text" fill="#e74c3c" font-weight="bold">⛔ Обробка зупиняється</text>
  
  <!-- Final Output -->
  <rect x="450" y="670" width="300" height="100" class="output-box" rx="8"/>
  <text x="600" y="695" text-anchor="middle" class="label" font-weight="bold" font-size="15px">📤 Вихід (Normalized DataItem)</text>
  <text x="470" y="720" text-anchor="start" class="code-text">question: "Show all students"</text>
  <text x="470" y="738" text-anchor="start" class="code-text">sql: "SELECT * FROM students"</text>
  <text x="470" y="756" text-anchor="start" class="code-text" fill="#27ae60">dbId: "university" ✓ (гарантовано)</text>
  
  <!-- Legend -->
  <rect x="50" y="790" width="1100" height="50" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="2" rx="8"/>
  <text x="600" y="810" text-anchor="middle" class="label" font-weight="bold">💡 Ключові переваги</text>
  <text x="70" y="828" text-anchor="start" class="small-text">✓ Автоматичне створення БД з DDL схем • ✓ Валідація здоров'я БД • ✓ Гарантоване заповнення dbId • ✓ Підтримка існуючих і генерованих БД</text>
</svg>


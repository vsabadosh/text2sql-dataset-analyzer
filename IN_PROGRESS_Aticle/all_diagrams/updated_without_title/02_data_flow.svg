  <text
     x="630"
     y="769"
     text-anchor="middle"
     class="small-text"
     fill="#ff6f00"
     font-style="italic"
     id="text64" />
  <!-- Reports -->
  <rect
     x="428"
     y="787"
     width="220"
     height="60"
     fill="#ffffff"
     stroke="#ff9800"
     stroke-width="2"
     rx="5"
     id="rect64" />
  <text
     x="538"
     y="807"
     text-anchor="middle"
     class="small-text"
     font-weight="bold"
     id="text65">7 типів MD звітів:</text>
  <text
     x="538"
     y="824"
     text-anchor="middle"
     class="small-text"
     id="text66">Summary, Schema, LLM Issues,</text>
  <text
     x="538"
     y="839"
     text-anchor="middle"
     class="small-text"
     id="text67">Execution, Structure, Coverage, Quality</text>
  <!-- Arrow from DuckDB to Reports -->
  <!-- Note -->
  <text
     x="722"
     y="797"

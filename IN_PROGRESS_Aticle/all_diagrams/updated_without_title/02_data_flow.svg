  <!-- Title -->
  <text
     x="700"
     y="30"
     text-anchor="middle"
     class="title"
     id="text1">Потік даних через систему Text2SQL Pipeline</text>
  <text
     x="700"
     y="50"
     text-anchor="middle"
     class="subtitle"
     id="text2">Потокова обробка запису від входу до виходу (5 рівнів)</text>
  <!-- Stage 1: Input Data -->
  <rect
     x="130.1832"
     y="79.897018"
     width="224.91275"
     height="120.20597"
     class="data-box"
     rx="6.4260783"
     id="rect2" />
  <text
     x="232"
     y="110"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     id="text3">РІВЕНЬ1. ВХІДНИЙ ШАР</text>
  <text
     x="232"
     y="130"
     text-anchor="middle"
     class="code-text"
     id="text4">{</text>
  <text
     x="232"
     y="145"
     text-anchor="middle"
     class="code-text"
     id="text5">&quot;question&quot;: &quot;Show students...&quot;,</text>
  <text
     x="232"
     y="160"
     text-anchor="middle"
     class="code-text"
     id="text6">&quot;query&quot;: &quot;SELECT * FROM...&quot;,</text>
  <text
     x="232"
     y="175"
     text-anchor="middle"
     class="code-text"
     id="text7">&quot;db_id&quot;: &quot;university&quot;</text>
  <text
     x="232"
     y="190"
     text-anchor="middle"
     class="code-text"
     id="text8">}</text>
  <!-- Arrow 1 -->
  <path
     d="M 356,140 H 456"
     class="arrow"
     id="path8" />
  <text
     x="396"
     y="130"
     text-anchor="middle"
     class="arrow-label"
     id="text9">LOAD</text>
  <!-- Stage 2: Normalization -->
  <rect
     x="455.8157"
     y="79.897018"
     width="224.91273"
     height="120.20598"
     class="process-box"
     rx="6.4260783"
     id="rect9" />
  <text
     x="570"
     y="105"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     id="text10">РІВЕНЬ 2.НОРМАЛІЗАЦІЯ</text>
  <text
     x="570"
     y="125"
     text-anchor="middle"
     class="small-text"
     id="text11">1. Alias Mapper</text>
  <text
     x="570"
     y="142"
     text-anchor="middle"
     class="code-text"
     id="text12">query → sql, db_id → dbId</text>
  <text
     x="570"
     y="160"
     text-anchor="middle"
     class="small-text"
     id="text13">2. ID Assignment</text>
  <text
     x="570"
     y="177"
     text-anchor="middle"
     class="code-text"
     id="text14">id = &quot;abc123_hash&quot;</text>
  <text
     x="570"
     y="195"
     text-anchor="middle"
     class="small-text"
     id="text15">3. DB Verification</text>
  <!-- Arrow 2 -->
  <path
     d="M 682,140 H 782"
     class="arrow"
     id="path15" />
  <text
     x="732"
     y="130"
     text-anchor="middle"
     class="arrow-label"
     id="text16">NORMALIZE</text>
  <!-- Stage 3: DataItem -->
  <rect
     x="784.0321"
     y="79.841301"
     width="223.29626"
     height="120.3174"
     class="stage-box"
     rx="6.3798933"
     id="rect16" />
  <text
     x="902"
     y="105"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     id="text17">Стандартизований DataItem</text>
  <text
     x="902"
     y="125"
     text-anchor="middle"
     class="code-text"
     id="text18">DataItem {</text>
  <text
     x="902"
     y="140"
     text-anchor="middle"
     class="code-text"
     id="text19">id: str, question: str,</text>
  <text
     x="902"
     y="155"
     text-anchor="middle"
     class="code-text"
     id="text20">sql: str, dbId: str,</text>
  <text
     x="902"
     y="170"
     text-anchor="middle"
     class="code-text"
     id="text21">schema: Optional[str],</text>
  <text
     x="902"
     y="185"
     text-anchor="middle"
     class="code-text"
     id="text22">metadata: dict</text>
  <text
     x="902"
     y="200"
     text-anchor="middle"
     class="code-text"
     id="text23">}</text>
  <!-- Arrow 3 -->
  <text
     x="900"
     y="223"
     text-anchor="start"
     class="arrow-label"
     id="text24">STREAM</text>
  <!-- Analysis Pipeline Container -->
  <rect
     x="126.36406"
     y="235.59143"
     width="884.21222"
     height="317.30246"
     class="stage-box"
     rx="5.4413061"
     id="rect24" />
  <text
     x="576"
     y="261"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     font-size="16px"
     id="text25">РІВЕНЬ 3. АНАЛІТИЧНИЙ КОНВЕЄР (Streaming через 5 аналізаторів)</text>
  <!-- Analyzer 1: Schema Validation -->
  <rect
     x="182"
     y="282"
     width="220"
     height="90"
     class="process-box"
     rx="5"
     id="rect25" />
  <text
     x="292"
     y="302"
     text-anchor="middle"
     class="label"
     id="text26">Schema Validation</text>
  <text
     x="292"
     y="322"
     text-anchor="middle"
     class="small-text"
     id="text27">• Перевірка FK integrity</text>
  <text
     x="292"
     y="340"
     text-anchor="middle"
     class="small-text"
     id="text28">• Validate column types</text>
  <text
     x="292"
     y="358"
     text-anchor="middle"
     class="small-text"
     id="text29">• Cache по db_id</text>
  <text
     x="292"
     y="392"
     text-anchor="middle"
     class="time-label"
     id="text30">~14ms/запит</text>
  <!-- Analyzer 2: Query Syntax -->
  <rect
     x="462"
     y="282"
     width="220"
     height="90"
     class="process-box"
     rx="5"
     id="rect30" />
  <text
     x="572"
     y="302"
     text-anchor="middle"
     class="label"
     id="text31">Query Syntax</text>
  <text
     x="572"
     y="322"
     text-anchor="middle"
     class="small-text"
     id="text32">• Parse SQL (sqlglot)</text>
  <text
     x="572"
     y="340"
     text-anchor="middle"
     class="small-text"
     id="text33">• Extract features</text>
  <text
     x="572"
     y="358"
     text-anchor="middle"
     class="small-text"
     id="text34">• Calculate complexity</text>
  <text
     x="572"
     y="392"
     text-anchor="middle"
     class="time-label"
     id="text35">~2ms/запит</text>
  <!-- Analyzer 3: Query Execution -->
  <rect
     x="742"
     y="282"
     width="220"
     height="90"
     class="process-box"
     rx="5"
     id="rect35" />
  <text
     x="852"
     y="302"
     text-anchor="middle"
     class="label"
     id="text36">Query Execution</text>
  <text
     x="852"
     y="322"
     text-anchor="middle"
     class="small-text"
     id="text37">• Safe execution</text>
  <text
     x="852"
     y="340"
     text-anchor="middle"
     class="small-text"
     id="text38">• Measure time</text>
  <text
     x="852"
     y="358"
     text-anchor="middle"
     class="small-text"
     id="text39">• Count rows</text>
  <text
     x="852"
     y="392"
     text-anchor="middle"
     class="time-label"
     id="text40">~3ms/запит</text>
  <!-- Analyzer 4: Antipattern -->
  <rect
     x="182"
     y="422"
     width="220"
     height="90"
     class="process-box"
     rx="5"
     id="rect40" />
  <text
     x="292"
     y="442"
     text-anchor="middle"
     class="label"
     id="text41">Antipattern Detector</text>
  <text
     x="292"
     y="462"
     text-anchor="middle"
     class="small-text"
     id="text42">• Scan 14 patterns</text>
  <text
     x="284"
     y="480"
     text-anchor="middle"
     class="small-text"
     id="text43">• Quality score</text>
  <text
     x="288"
     y="498"
     text-anchor="middle"
     class="small-text"
     id="text44">• Severity rating</text>
  <text
     x="292"
     y="532"
     text-anchor="middle"
     class="time-label"
     id="text45">~1ms/запит</text>
  <!-- Analyzer 5: LLM Judge -->
  <rect
     x="462"
     y="422"
     width="500"
     height="90"
     class="process-box"
     rx="5"
     id="rect45" />
  <text
     x="712"
     y="442"
     text-anchor="middle"
     class="label"
     id="text46">Semantic LLM Judge (Consensus Voting)</text>
  <text
     x="568"
     y="462"
     text-anchor="middle"
     class="small-text"
     id="text47">1. Generate smart DDL</text>
  <text
     x="562"
     y="480"
     text-anchor="middle"
     class="small-text"
     id="text48">2. Query LLM voters</text>
  <text
     x="562"
     y="498"
     text-anchor="middle"
     class="small-text"
     id="text49">3. Aggregate results</text>
  <text
     x="862"
     y="462"
     text-anchor="middle"
     class="small-text"
     id="text50">GPT-4o: CORRECT (0.8)</text>
  <text
     x="862"
     y="480"
     text-anchor="middle"
     class="small-text"
     id="text51">Gemini: CORRECT (0.8)</text>
  <text
     x="862"
     y="498"
     text-anchor="middle"
     class="small-text"
     id="text52">Consensus: CORRECT ✓</text>
  <text
     x="712"
     y="532"
     text-anchor="middle"
     class="time-label"
     id="text53">~21 сек/запит (залежить від API)</text>
  <!-- Arrow connecting last two analyzers to a merge point -->
  <!-- Performance note -->
  <!-- LEVEL 4: OUTPUT LAYER (Two parallel outputs) -->
  <rect
     x="128.85188"
     y="588.56641"
     width="886.79791"
     height="140.51764"
     fill="#f9f9f9"
     stroke="#2c3e50"
     stroke-width="2.48235"
     rx="5.4572177"
     id="rect54" />
  <text
     x="608.37024"
     y="610.52185"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     font-size="16px"
     id="text55">РІВЕНЬ 4: ВИХІДНИЙ ШАР (Output Layer)</text>
  <!-- Left: Annotated Dataset -->
  <rect
     x="292.38715"
     y="632.62396"
     width="250.3141"
     height="80.752029"
     class="stage-box"
     rx="4.4500284"
     id="rect55" />
  <text
     x="421"
     y="658"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     id="text56">Анотований Dataset</text>
  <text
     x="421"
     y="678"
     text-anchor="middle"
     class="code-text"
     id="text57">annotatedOutputDataset.jsonl</text>
  <text
     x="421"
     y="696"
     text-anchor="middle"
     class="small-text"
     id="text58">+ metadata від усіх аналізаторів</text>
  <!-- Right: DuckDB Analytics -->
  <ellipse
     cx="772.33514"
     cy="671.82288"
     rx="155.38512"
     ry="44.227108"
     fill="#fdecea"
     stroke="#e74c3c"
     stroke-width="2.39309"
     id="ellipse58" />
  <text
     x="768"
     y="667"
     text-anchor="middle"
     class="label"
     font-size="16px"
     fill="#e74c3c"
     font-weight="bold"
     id="text59">DuckDB Analytics</text>
  <text
     x="772"
     y="683"
     text-anchor="middle"
     class="small-text"
     fill="#e74c3c"
     id="text60">metrics.duckdb</text>
  <text
     x="772"
     y="698"
     text-anchor="middle"
     class="small-text"
     fill="#e74c3c"
     id="text61">(Single Source of Truth)</text>
  <!-- Arrow from analyzer merge point to DuckDB -->
  <!-- Arrows DOWN from Level 4 outputs -->
  <!-- LEVEL 5: REPORT GENERATION (Optional) -->
  <rect
     x="371.39133"
     y="760.05951"
     width="491.01514"
     height="101.07975"
     class="optional-box"
     rx="3.0216315"
     id="rect63" />
  <text
     x="539.0799"
     y="774.89124"
     text-anchor="middle"
     class="label"
     font-weight="bold"
     font-size="16px"
     id="text55-4"

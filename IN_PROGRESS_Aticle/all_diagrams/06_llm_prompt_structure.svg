<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 1400 1100"
   version="1.1"
   id="svg1"
   xmlns="http://www.w3.org/2000/svg">
  <defs id="defs1">
    <style id="style1">
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #4a4a4a; }
      .section-title { font-family: Arial, sans-serif; font-size: 15px; font-weight: bold; fill: #2c3e50; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #2c3e50; font-weight: 500; }
      .small-text { font-family: Arial, sans-serif; font-size: 11px; fill: #34495e; }
      .code-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #2c3e50; }
      .code-comment { font-family: 'Courier New', monospace; font-size: 9px; fill: #7f8c8d; font-style: italic; }
      .prompt-box { fill: #e8f4f8; stroke: #3498db; stroke-width: 3; }
      .input-box { fill: #fff3cd; stroke: #ffc107; stroke-width: 2; }
      .output-box { fill: #d4edda; stroke: #28a745; stroke-width: 2; }
      .verdict-box { fill: #f8f9fa; stroke: #6c757d; stroke-width: 2; }
      .arrow { stroke: #2c3e50; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .bracket { stroke: #e74c3c; stroke-width: 2; fill: none; }
    </style>
    <marker
       id="arrowhead"
       markerWidth="10"
       markerHeight="10"
       refX="9"
       refY="3"
       orient="auto">
      <polygon
         points="0 0, 10 3, 0 6"
         fill="#2c3e50"
         id="polygon1" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="35" text-anchor="middle" class="title">LLM Prompt Structure for Semantic Validation</text>
  <text x="700" y="58" text-anchor="middle" class="subtitle">Structured input-output format with four-category verdict classification</text>

  <!-- Main Prompt Container -->
  <rect x="50" y="80" width="1300" height="980" class="prompt-box" rx="10"/>

  <!-- Section 1: Input Parameters -->
  <text x="70" y="110" class="section-title">Input Parameters (Template Placeholders)</text>
  
  <!-- Dialect -->
  <rect x="80" y="125" width="600" height="55" class="input-box" rx="5"/>
  <text x="100" y="145" class="label">{{dialect}}</text>
  <text x="100" y="162" class="small-text">Database SQL dialect specification</text>
  <text x="100" y="175" class="code-text" fill="#666">Example: "sqlite", "postgresql", "mysql"</text>

  <!-- DDL Schema -->
  <rect x="700" y="125" width="600" height="55" class="input-box" rx="5"/>
  <text x="720" y="145" class="label">{{ddl_schema}}</text>
  <text x="720" y="162" class="small-text">CREATE TABLE statements with example data</text>
  <text x="720" y="175" class="code-text" fill="#666">Mode: "full" (all tables) or "query_derived" (referenced only)</text>

  <!-- Natural Question -->
  <rect x="80" y="195" width="600" height="55" class="input-box" rx="5"/>
  <text x="100" y="215" class="label">{{natural_question}}</text>
  <text x="100" y="232" class="small-text">Natural language question from dataset</text>
  <text x="100" y="245" class="code-text" fill="#666">Example: "Show all students with grade above 90"</text>

  <!-- SQL Query -->
  <rect x="700" y="195" width="600" height="55" class="input-box" rx="5"/>
  <text x="720" y="215" class="label">{{sql_to_revise}}</text>
  <text x="720" y="232" class="small-text">SQL query to be evaluated</text>
  <text x="720" y="245" class="code-text" fill="#666">Example: "SELECT * FROM students WHERE grade &gt; 90"</text>

  <!-- Separator -->
  <line x1="70" y1="275" x2="1330" y2="275" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Section 2: Evaluation Instructions -->
  <text x="70" y="305" class="section-title">Evaluation Criteria (From Prompt Template)</text>
  
  <rect x="80" y="320" width="1240" height="135" fill="#ffffff" stroke="#3498db" stroke-width="2" rx="5"/>
  <text x="100" y="342" class="small-text" font-weight="bold">Instructions to LLM:</text>
  <text x="120" y="365" class="small-text">• Verify semantic correctness: Does the SQL correctly answer the question?</text>
  <text x="120" y="385" class="small-text">• Check filters, joins, aggregation logic, GROUP BY, HAVING clauses</text>
  <text x="120" y="405" class="small-text">• Consider NULL handling, empty-set behavior, DISTINCT vs duplicates</text>
  <text x="120" y="425" class="small-text">• Validate ordering/limits and handling of ties if applicable</text>
  <text x="120" y="445" class="small-text">• Do NOT comment on syntax, style, or performance — focus on semantics only</text>

  <!-- Separator -->
  <line x1="70" y1="475" x2="1330" y2="475" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Section 3: Output Format -->
  <text x="70" y="505" class="section-title">Required Output Format</text>

  <!-- Output specification box -->
  <rect x="80" y="520" width="1240" height="160" class="output-box" rx="5"/>
  <text x="100" y="542" class="label" font-weight="bold">Strict JSON Response (no prose, no code fences):</text>
  
  <rect x="120" y="555" width="1180" height="110" fill="#ffffff" stroke="#28a745" stroke-width="1" rx="3"/>
  <text x="140" y="575" class="code-text" fill="#c7254e">{</text>
  <text x="160" y="595" class="code-text">  "verdict": <tspan fill="#0066cc">"CORRECT"</tspan>,</text>
  <text x="160" y="615" class="code-text">  "explanation": <tspan fill="#0066cc">""</tspan></text>
  <text x="160" y="635" class="code-comment">  // Empty string for CORRECT; ≤200 chars for others</text>
  <text x="140" y="655" class="code-text" fill="#c7254e">}</text>

  <!-- Separator -->
  <line x1="70" y1="700" x2="1330" y2="700" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Section 4: Verdict Categories -->
  <text x="70" y="730" class="section-title">Verdict Categories (Four-Label Classification)</text>

  <!-- CORRECT -->
  <rect x="80" y="750" width="620" height="115" class="verdict-box" rx="5"/>
  <text x="100" y="775" class="label" font-weight="bold" fill="#28a745">✓ CORRECT</text>
  <text x="120" y="798" class="small-text"><tspan font-weight="bold">When:</tspan> Query fully and accurately answers the question</text>
  <text x="140" y="815" class="small-text">with no semantic issues</text>
  <text x="120" y="835" class="small-text"><tspan font-weight="bold">Explanation:</tspan> Must be empty string <tspan class="code-text">""</tspan></text>
  <text x="120" y="855" class="code-text" fill="#28a745">{"verdict":"CORRECT","explanation":""}</text>

  <!-- PARTIALLY_CORRECT -->
  <rect x="720" y="750" width="620" height="115" class="verdict-box" rx="5"/>
  <text x="740" y="775" class="label" font-weight="bold" fill="#ffc107">⚠ PARTIALLY_CORRECT</text>
  <text x="760" y="798" class="small-text"><tspan font-weight="bold">When:</tspan> Mostly correct but has minor issues:</text>
  <text x="780" y="815" class="small-text">• Missing DISTINCT | Imprecise date boundaries</text>
  <text x="780" y="830" class="small-text">• NULL edge cases | Non-deterministic GROUP BY</text>
  <text x="760" y="850" class="small-text"><tspan font-weight="bold">Explanation:</tspan> Single-line, ≤200 chars, specific issue</text>

  <!-- INCORRECT -->
  <rect x="80" y="880" width="620" height="115" class="verdict-box" rx="5"/>
  <text x="100" y="905" class="label" font-weight="bold" fill="#dc3545">✗ INCORRECT</text>
  <text x="120" y="928" class="small-text"><tspan font-weight="bold">When:</tspan> Fundamental semantic errors:</text>
  <text x="140" y="945" class="small-text">• Wrong tables/columns | Missing/incorrect JOINs</text>
  <text x="140" y="960" class="small-text">• Wrong aggregation logic | Incorrect WHERE clauses</text>
  <text x="140" y="975" class="small-text">• Produces fundamentally wrong answer</text>
  <text x="120" y="990" class="small-text"><tspan font-weight="bold">Explanation:</tspan> Single-line, ≤200 chars, main error</text>

  <!-- UNANSWERABLE -->
  <rect x="720" y="880" width="620" height="115" class="verdict-box" rx="5"/>
  <text x="740" y="905" class="label" font-weight="bold" fill="#6c757d">? UNANSWERABLE</text>
  <text x="760" y="928" class="small-text"><tspan font-weight="bold">When:</tspan> Cannot be answered from schema:</text>
  <text x="780" y="945" class="small-text">• Missing required tables/columns</text>
  <text x="780" y="960" class="small-text">• Requires external data not in database</text>
  <text x="780" y="975" class="small-text">• Ambiguous or contradictory question</text>
  <text x="760" y="990" class="small-text"><tspan font-weight="bold">Explanation:</tspan> Single-line, ≤200 chars, what's missing</text>

  <!-- Bottom note -->
  <rect x="80" y="1010" width="1240" height="40" fill="#f8f9fa" stroke="#6c757d" stroke-width="1" rx="5"/>
  <text x="700" y="1033" text-anchor="middle" class="small-text" font-style="italic">
    Note: Verdict scores for weighted aggregation: CORRECT=1.0, PARTIALLY_CORRECT=0.5, INCORRECT=0.0, UNANSWERABLE=0.0
  </text>

</svg>


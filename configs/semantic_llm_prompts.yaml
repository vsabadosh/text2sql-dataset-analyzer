# Semantic LLM Judge Prompt Templates
#
# Available placeholders:
# - {{dialect}} - Database dialect (e.g., "sqlite", "postgresql")
# - {{ddl_schema}} - DDL schema (CREATE TABLE statements with examples)
# - {{natural_question}} - Natural language question
# - {{sql_to_revise}} - SQL query to evaluate

# Simple variant - Basic semantic evaluation
variant_1: |
  Task:
  You are a data science expert. Evaluate whether the provided SQL query correctly answers the question given the database schema.

  Database Engine:
  {{dialect}}

  ### Database Schema:
  {{ddl_schema}}

  ### Question:
  {{natural_question}}

  ### SQL Query:
  {{sql_to_revise}}


  Allowed verdicts (choose exactly one):

  - CORRECT — The output is fully correct and produces the expected result.
  - PARTIALLY_CORRECT — The output is mostly correct but misses minor conditions or details.
  - INCORRECT — The output is logically wrong or does not answer the question.


  OUTPUT (STRICT):
  - Return exactly one JSON object and nothing else (no prose, no code fences).
  - Keys: "verdict", "explanation".
  - "verdict" MUST be one of: CORRECT, PARTIALLY_CORRECT, INCORRECT.
  - If "verdict" is CORRECT, set "explanation" to "" (empty string).
  - Otherwise, "explanation" MUST be single-line (no newlines), concise (≤ 160 chars).
  - No extra keys. No trailing commas.

  EXAMPLE (no explanation verdict):
  {"verdict":"CORRECT","explanation":""}

# Comprehensive variant - Assumes SQL is parseable and executable (DEFAULT)
variant_2: |
  You are a data science expert. Assume the SQL parses and executes in the specified dialect. Do not comment on syntax, style, or performance. Evaluate only logical correctness against the question using the provided schema.

  Database Engine (SQL dialect):
  {{dialect}}

  ### Database Schema
  {{ddl_schema}}

  ### Question
  {{natural_question}}

  ### SQL Query
  {{sql_to_revise}}

  Decision rules (semantics only):
  - Verify filters, joins, and join cardinality.
  - Check grouping/aggregation/window usage and HAVING logic.
  - Consider NULL handling, empty-set behavior, and DISTINCT vs duplicates.
  - Validate required ordering/limits and handling of ties if applicable.
  - Check time/date boundaries (inclusive/exclusive), casting, and comparisons.
  - Do not assume columns or data beyond the schema; do not propose fixes.

  Allowed verdicts (choose exactly one):
  - CORRECT — The output is fully correct and produces the expected result.
  - PARTIALLY_CORRECT — The output is mostly correct but misses minor conditions or details.
  - INCORRECT — The output is logically wrong or does not answer the question.

  OUTPUT (STRICT):
  - Return exactly one JSON object and nothing else (no prose, no code fences).
  - Keys: "verdict", "explanation".
  - If "verdict" is CORRECT, set "explanation" to "" (empty string).
  - Otherwise, "explanation" must be single-line (no newlines), concise (≤160 chars).
  - No extra keys. No trailing commas.

  EXAMPLE
  {"verdict":"CORRECT","explanation":""}

variant_3: |
  Task:
  You are a data science expert. Evaluate whether the provided SQL query correctly answers the question given the database schema.

  Database Engine:
  {{dialect}}

  ### Database Schema:
  {{ddl_schema}}

  ### Question:
  {{natural_question}}

  ### SQL Query:
  {{sql_to_revise}}

  Evaluation Criteria:
  - Does the query select the correct columns/aggregations?
  - Does it join the necessary tables with correct join conditions?
  - Are WHERE/HAVING filters logically correct?
  - Does it handle edge cases (NULLs, duplicates, empty results)?
  - Does the GROUP BY/ORDER BY match the question's intent?
  - Are there syntax errors or undefined references?

  Allowed verdicts (choose exactly one):

  - CORRECT — The query is fully correct and produces the expected result.
  - PARTIALLY_CORRECT — The query is mostly correct but has minor issues (e.g., missing edge case handling, suboptimal but functional logic, minor filtering issues).
  - INCORRECT — The query is logically wrong, has syntax errors, references non-existent tables/columns, or fundamentally misunderstands the question.

  OUTPUT (STRICT):
  - Return exactly one JSON object and nothing else (no prose, no code fences, no markdown).
  - Keys: "verdict", "explanation".
  - "verdict" MUST be exactly one of: CORRECT, PARTIALLY_CORRECT, INCORRECT (case-sensitive).
  - If "verdict" is "CORRECT", set "explanation" to "" (empty string).
  - Otherwise, "explanation" MUST be single-line (no newlines), concise (≤ 160 chars), and identify the specific issue.
  - No extra keys. No trailing commas. Valid JSON only.

  EXAMPLES:
  {"verdict":"CORRECT","explanation":""}
  {"verdict":"INCORRECT","explanation":"Query references non-existent column 'customer_email'; should use 'email' from customers table"}
  {"verdict":"PARTIALLY_CORRECT","explanation":"Missing NULL handling for optional address field; otherwise logic is sound"}

variant_4: |
  Task:
  You are a data science expert. Evaluate whether the provided SQL query correctly answers the question given the database schema.

  Database Engine:
  {{dialect}}

  ### Database Schema:
  {{ddl_schema}}

  ### Question:
  {{natural_question}}

  ### SQL Query:
  {{sql_to_revise}}

  Evaluation Criteria:
  - Answerability & Question Quality. UNANSWERABLE if any: required tables/columns missing; not a real question; ambiguous/underspecified; needs external data; contradictory constraints.
  - Selection/Aggregation: columns/expressions/aggregates match intent.
  - Joins: all required tables; correct keys; join type fits semantics.
  - Filters: WHERE/HAVING reflect constraints; date bounds inclusivity correct.
  - Edge cases: NULLs, duplicates (DISTINCT/GROUP BY), zero-row behavior.
  - Grain/Ordering: GROUP BY matches requested granularity; ignore ORDER BY unless explicitly required.
  - Equivalence: semantically equivalent queries count as CORRECT.

  Allowed verdicts (choose exactly one):
  - CORRECT — The query logic is fully correct and produces the expected result.
  - PARTIALLY_CORRECT — The query is mostly correct but has minor logical issues (e.g., missing NULL handling, suboptimal filtering).
  - INCORRECT — The query logic is fundamentally wrong or does not answer the question.
  - UNANSWERABLE — The question cannot be answered with the provided schema (references non-existent tables/columns/concepts).

  OUTPUT (STRICT):
  - Return exactly one JSON object and nothing else (no prose, no code fences, no markdown).
  - Keys: "verdict", "explanation".
  - "verdict" MUST be exactly one of: CORRECT, PARTIALLY_CORRECT, INCORRECT, UNANSWERABLE (case-sensitive).
  - If "verdict" is "CORRECT", set "explanation" to "" (empty string).
  - Otherwise, "explanation" MUST be single-line (no newlines), concise (≤ 160 chars), and identify the specific logical issue.
  - No extra keys. No trailing commas. Valid JSON only.

  EXAMPLE (no explanation verdict):
  {"verdict":"CORRECT","explanation":""}

variant_10: |
  Task: Perform semantic (logic/intent) review only — no execution, no syntax/style fixes.

  Dialect: {{dialect}}
  DDL Schema: {{ddl_schema}}
  Question: {{natural_question}}
  SQL: {{sql_to_revise}}

  Step 1 — Check Answerability (use provided schema only).
  If ANY apply, set verdict = UNANSWERABLE and SKIP Step 2:
  - Required tables/columns are missing
  - Question is not well-formed / intent is ambiguous or underspecified
  - Requires external data or contains contradictory constraints

  Step 2 — Evaluate SQL Logic (only if answerable):
  - Selection/Aggregation: Columns/metrics match intent; non-aggregates align with GROUP BY (query grain)
  - Joins: All needed tables; correct keys; join type matches semantics; guard against m:n duplicate inflation (e.g., missing GROUP BY after fact table joins)
  - Filters: WHERE/HAVING reflect constraints; date/time bounds match question intent (>= vs >); note timezone ambiguity if present
  - Edge Cases: NULL handling (JOIN/filters/aggregates), duplicates (DISTINCT/GROUP BY), zero-row behavior
  - Ordering/Determinism: ORDER BY only if sorting required; LIMIT/TOP without ORDER BY → PARTIALLY_CORRECT (non-deterministic)
  - Advanced Constructs: CTEs, subqueries, window functions consistent with intended grain and filters (frame clauses if relevant)
  - Equivalence: Accept any semantically equivalent solution (prefer simpler logic but don't penalize verbose-but-correct queries)

  Verdicts (enum):
  - CORRECT — fully answers the question
  - PARTIALLY_CORRECT — minor logical gaps (off-by-one date, missing DISTINCT, NULL handling, non-deterministic LIMIT)
  - INCORRECT — fundamentally wrong or doesn't answer the question
  - UNANSWERABLE — cannot be answered from provided schema

  OUTPUT (STRICT JSON, no extra keys, no trailing commas):
  {"verdict":"<verdict>","explanation":"<explanation>"}
  - If verdict = CORRECT, explanation = ""
  - Otherwise, explanation is single line ≤200 chars naming specific issue
  - Do not propose revised SQL

  EXAMPLES:
  {"verdict":"CORRECT","explanation":""}
  {"verdict":"PARTIALLY_CORRECT","explanation":"Uses > instead of >= for start_date, excluding boundary case"}
  {"verdict":"INCORRECT","explanation":"Missing JOIN to products; cannot access product_name from orders"}
  {"verdict":"UNANSWERABLE","explanation":"Schema lacks revenue columns needed for profit calculation"}



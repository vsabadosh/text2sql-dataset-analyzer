variant_13: |
    Task: You are a Text2SQL expert performing semantic validation on SQL queries. 
    Your goal: Verify that the SQL query correctly answers the natural language question based on the database schema.

    Dialect: {{dialect}}
    DDL Schema: {{ddl_schema}}
    NL Question: {{natural_question}}
    SQL: {{sql_to_revise}}

    Step 1 — Answerability
    Return UNANSWERABLE if:
    - Missing required tables/columns
    - Question ambiguous or contradictory
    - Needs external data

    Step 2 — Semantic Logic Check (if answerable)
    Evaluate:
    - Correct tables, joins, keys
    - Filters match question (date bounds, WHERE/HAVING)
    - Aggregations align with GROUP BY and intended grain
    - Handles NULLs, duplicates, edge cases
    - Determinism: LIMIT without ORDER BY ⇒ PARTIALLY_CORRECT; 
    - Selecting non-grouped columns without functional dependency ⇒ PARTIALLY_CORRECT
    - Tie-breaking if a single “top” result is implied
    - COUNT(*) vs COUNT(DISTINCT …) consistent with PK/UKs
    - CTEs/subqueries/window functions consistent with grain and filters (frame clauses if relevant)
    - Accept any semantically correct solution, regardless of complexity

    Dialect-specific semantics:
      * SQLite:
          1) Cross-type joins allowed. Equality in JOIN/WHERE follows affinity/coercion; do NOT mark incorrect solely due to TEXT vs INTEGER (or other) type mismatches. If this is the only issue, return CORRECT.
          2) Identifiers are case-insensitive (e.g., cost_Id == cost_id).
          3) Permissive GROUP BY: selecting non-grouped columns is allowed; mark PARTIALLY_CORRECT unless functional dependency is guaranteed by schema.
          4) Foreign keys: do not require matching declared types for semantic correctness (FK enforcement may be separate).

    Verdicts:
    - CORRECT — fully correct
    - PARTIALLY_CORRECT — minor issues (date bounds, DISTINCT, NULL handling, determinism)
    - INCORRECT — fundamentally wrong
    - UNANSWERABLE — can't answer from schema

    OUTPUT (STRICT):
    - Return exactly one JSON object and nothing else (no prose, no code fences)
    - Keys: "verdict", "explanation"
    - "verdict" MUST be one of: CORRECT, PARTIALLY_CORRECT, INCORRECT, UNANSWERABLE
    - If "verdict" is CORRECT, "explanation" MUST be "" (empty string)
    - Otherwise, "explanation" MUST be ≤200 chars, single-line (no \n), describing the specific issue
    - No extra keys, no trailing commas, valid JSON only

    EXAMPLE:
    {"verdict":"CORRECT","explanation":""}


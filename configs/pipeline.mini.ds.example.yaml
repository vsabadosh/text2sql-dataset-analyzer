sourceDb:
  dialect: sqlite           # or: postgresql
  kind: file                # or: server
  endpoint: "./data_examples/databases"    # sqlite root folder
  # postgresql example:
  # endpoint: "postgresql+psycopg://app:${PG_APP_PASS}@127.0.0.1:5432"

load:
  name: jsonl # jsonl | json | csv | hf
  params:
    path: data_examples/spider-tiny.jsonl

# Example using HuggingFace datasets (with optional token for private repos)
# load:
#   name: hf
#   params:
#     name: "spider"
#     split: "train"
#     token: "${HF_TOKEN}"  # Optional: HuggingFace API token for private datasets

# Progress tracking configuration
progress:
  expected_items: 10          # Optional: Expected number of items for percentage tracking
  show_progress: true         # Optional: Show real-time progress bar (default: true)

normalize:
  - name: alias_mapper
    params:
      mapping:
        question: question
        sql: query
        schema: schema
        dbId: db_id
        id: id

  - name: id_assign        
    params:
      mode: incremental

  - name: db_identity_assign
    params: {}             

analyze:
  - name: schema_validation_analyzer
    params:
      enabled: true

  - name: query_syntax_analyzer
    params:
      enabled: true

  - name: query_antipattern_analyzer
    params:
      enabled: true
      # ═══════════════════════════════════════════════════════════════════════════════
      # ANTIPATTERN SEVERITY LEVELS
      # ═══════════════════════════════════════════════════════════════════════════════
      # 
      # CRITICAL: Always produces WRONG RESULTS or causes DATA SAFETY issues
      #    -> Must be fixed immediately
      #    -> Query returns incorrect data or risks data loss
      # 
      # HIGH: Produces WRONG RESULTS in specific cases (subtle semantic errors)
      #    -> Dangerous patterns that fail under certain conditions
      #    -> Query works in some cases but breaks with NULL, edge cases, etc.
      # 
      # MEDIUM: Correct results but PERFORMANCE or CODE QUALITY issues
      #    -> Optimization opportunities (slow queries, index-breaking)
      #    -> Redundant operations that waste resources
      #    -> Modern SQL best practices violations
      # 
      # LOW: STYLE preferences or CONTEXT-DEPENDENT patterns
      #    -> Acceptable in Text2SQL benchmarks
      #    -> May be problematic in production but not for research datasets
      # ═══════════════════════════════════════════════════════════════════════════════
      
      # ═══════════════════════════════════════════════════════════════════════════════
      # SEVERITY PENALTIES (for quality score calculation)
      # ═══════════════════════════════════════════════════════════════════════════════
      # Quality Score = 100 - sum(penalty * count_of_antipatterns_at_severity)
      # Customize penalties based on your dataset's quality requirements
      penalties:
        critical: 30    # Severe: always wrong results
        high: 15        # Dangerous: wrong in edge cases
        medium: 5       # Performance/quality issues
        low: 2          # Style preferences
      
      antipatterns:
        sqlite:
          critical:
            - null_comparison_equals         # `= NULL` instead of `IS NULL` (always evaluates to NULL/false)
            - unsafe_update_delete           # UPDATE/DELETE without WHERE (accidental data loss)
            - cartesian_product              # Missing JOIN condition (exponential result explosion)
          high:
            - not_in_nullable                # `NOT IN (subquery)` when subquery can return NULL -> always false
            - limit_without_order_by         # LIMIT without ORDER BY -> nondeterministic row selection
            - offset_without_order_by        # OFFSET without ORDER BY -> meaningless pagination
            - missing_group_by               # Non-aggregated columns without GROUP BY (SQL semantic error)
          medium:
            - function_in_where              # Functions on indexed columns prevent index usage
            - correlated_subquery            # Row-by-row execution (often has better alternatives)
            - leading_wildcard_like          # `LIKE '%pattern'` forces full table scan
          low:
            - select_star                    # `SELECT *` (common in research datasets, avoided in production)
            - redundant_distinct             # DISTINCT with GROUP BY (duplicate elimination already guaranteed)
            - select_in_exists               # `SELECT col` in EXISTS; columns are ignored, use SELECT 1 for clarity

        postgresql:
          critical:
            - null_comparison_equals         # `= NULL` instead of `IS NULL`
            - missing_group_by               # Non-aggregated columns without GROUP BY
            - unsafe_update_delete           # UPDATE/DELETE without WHERE
            - cartesian_product              # Missing JOIN condition
          high:
            - not_in_nullable                # `NOT IN` with nullable subquery
            - limit_without_order_by         # LIMIT without ORDER BY -> nondeterministic row selection
            - offset_without_order_by        # OFFSET without ORDER BY -> meaningless pagination
          medium:
            - function_in_where              # Index-breaking functions in WHERE
            - correlated_subquery            # Inefficient row-by-row execution
            - leading_wildcard_like          # Full table scan pattern
          low:
            - select_star                    # Style preference (acceptable in Text2SQL)
            - redundant_distinct             # DISTINCT + GROUP BY redundancy
            - select_in_exists               # Wasteful column selection in EXISTS

  - name: query_execution_analyzer
    params:
      enabled: true
      mode: all

  # ═══════════════════════════════════════════════════════════════════════════════
  # LLM-as-a-Judge semantic validation (optional)
  # Uncomment and configure providers to enable semantic validation
  # ═══════════════════════════════════════════════════════════════════════════════
  - name: semantic_llm_analyzer
    params:
      enabled: false                # Set to true and configure providers below
      prompt_file: "configs/semantic_llm_prompts.yaml"
      prompt_variant: default       # Options: variant_1, variant_2, default (variant_3)
      # custom_prompt: "Your custom prompt..."  # Override file/variant
      schema_mode: query_derived    # Options: 'full' (all tables) or 'query_derived' (only referenced tables)
      num_examples: 2               # Number of example values per column in DDL
      parallel_voters: true
      max_workers: 4                # 0 or omit -> auto = num providers; set 2..N to cap

      # ═══════════════════════════════════════════════════════════════════════════════
      # LLM PROVIDER CONFIGURATION  (config-driven, no hardcoded model names)
      # ═══════════════════════════════════════════════════════════════════════════════
      # Environment variables resolved automatically: ${VAR_NAME} or ${VAR_NAME:default_value}
      #
      # -- PER-MODEL PARAMETERS --
      #
      # temperature:  Sampling temperature (0.0 = deterministic).
      #               Ignored/overridden when reasoning is enabled.
      #
      # reasoning:    Reasoning control. Takes PRIORITY over temperature.
      #               Fields: enabled (bool), effort (string), mode (string, optional).
      #               The effort value is passed through to each provider's
      #               API as-is, so new values work without code changes.
      #
      #   Provider         | How "effort" is mapped
      #   -----------------+-----------------------------------------------
      #   OpenAI           | reasoning={"effort": effort}
      #   (GPT-5.x, o-*)  | temperature is NOT sent (API rejects it)
      #                    | effort: none|minimal|low|medium|high|xhigh
      #   -----------------+-----------------------------------------------
      #   Anthropic        | mode=adaptive: adaptive thinking
      #                    | mode=manual: manual budget thinking
      #                    | mode=auto: adaptive then fallback to manual
      #                    | effort: low|medium|high|max
      #   -----------------+-----------------------------------------------
      #   Gemini           | mode=level: thinking_level
      #                    | mode=budget: thinking_budget
      #                    | mode=auto: 2.x->budget, 3.x+->level
      #                    | (budget mapping: low->1024 med->8192 high->24576)
      #                    | level/budget: LOW|MEDIUM|HIGH
      #   -----------------+-----------------------------------------------
      #   Ollama           | Logged only (reasoning is model-internal)
      # ═══════════════════════════════════════════════════════════════════════════════
      providers:
        # -- OpenAI --
        - name: openai
          api_key: "${OPENAI_API_KEY}"
          models:
            - name: gpt-5.2
              weight: 1.0
              reasoning:
                enabled: true
                effort: high             # none|minimal|low|medium|high|xhigh
            # Non-reasoning model -- uses temperature instead:
            # - name: gpt-4o
            #   weight: 1.0
            #   temperature: 0.0

        # -- Anthropic --
        - name: anthropic
          api_key: "${ANTHROPIC_API_KEY}"
          models:
            - name: claude-sonnet-4-5
              weight: 1.0
              reasoning:
                enabled: true
                effort: high             # low|medium|high|max
                mode: manual             # auto|adaptive|manual

        # -- Gemini --
        # Both 2.x and 3.x use the same "effort" config -- the provider
        # auto-detects which API parameter to use (thinking_budget vs thinking_level).
        - name: gemini
          api_key: "${GEMINI_API_KEY}"
          fallback_keys:
            - "${GEMINI_API_KEY_1}"
          models:
            - name: gemini-2.5-pro
              weight: 1.0
              reasoning:
                enabled: true
                effort: high             # low|medium|high (-> thinking_budget 8192)
                mode: budget             # auto|level|budget
            - name: gemini-3.1-pro-preview
              weight: 1.0
              reasoning:
                enabled: true
                effort: high             # low|medium|high (-> thinking_level MEDIUM)
                mode: level              # auto|level|budget
        
        # -- Ollama (local) --
        # - name: ollama
        #   base_url: "${OLLAMA_BASE_URL:http://localhost:11434}"
        #   models:
        #     - name: deepseek-r1:14b
        #       weight: 1.0
        #       temperature: 0.0
        #       # reasoning:
        #       #   enabled: true
        #       #   effort: medium

output:
  dataset_name: my_analysis
  # base_dir: "."                        # Root directory for output (default: current directory)

  # JSONL Metrics Configuration (optional)
  jsonl_enabled: true                  # Enable JSONL metrics storage
  # jsonl_path: "./custom/metrics"     # Optional: custom directory path

  # DuckDB Configuration (always enabled)
  # duckdb_path: "./custom/metrics.duckdb"  # Optional: custom path

  # Report Generation Configuration (optional, requires DuckDB which is always enabled)
  reports:
    enabled: true                      # Master switch for all report generation
    output_dir: "all_reports"          # Subfolder for reports (relative to output root)

    # Individual report toggles
    summary_report: true              # Main comprehensive report
    schema_validation: true           # Schema validation details
    llm_judge_issues: true            # LLM judge warnings/errors only
    query_execution_issues: true      # Failed executions only
    query_structure_profile: true     # Query structure analysis
    table_coverage: true              # Table usage coverage
    query_quality: true               # Quality assessment

sourceDb:
  dialect: sqlite           # or: postgresql
  kind: file                # or: server
  endpoint: "./data_examples/databases"    # sqlite root folder
  # endpoint: /Users/volodyms/projects/LLM/llm_tuning/spiderNew/database
  # endpoint: /Users/volodyms/projects/LLM/llm_tuning/bird_train_20240627/train_databases
  # postgresql example:
  # endpoint: "postgresql+psycopg://app:${PG_APP_PASS}@127.0.0.1:5432"

load:
  name: jsonl # jsonl | json | csv | hf
  params:
    path: data_examples/spider-tiny-9.jsonl
# # Example using HuggingFace datasets (with optional token for private repos)
# load:
#   name: hf
#   params:
#     name: "koookiy/spider-SQL-data-train"
#     split: "train"
#     token: "${HF_TOKEN}"  # Optional: HuggingFace API token for private datasets

# Progress tracking configuration
progress:
  expected_items: 2         # Optional: Expected number of items for percentage tracking
  show_progress: true         # Optional: Show real-time progress bar (default: true)

normalize:
  - name: alias_mapper
    params:
      mapping:
        question: question
        sql: query
        schema: schema
        dbId: db_id

  - name: id_assign        
    params:
      mode: incremental

  - name: db_identity_assign
    params: {}             

analyze:
  - name: schema_validation_analyzer
    params:
      enabled: true

  - name: query_syntax_analyzer
    params:
      enabled: true

  - name: query_execution_analyzer
    params:
      enabled: true
      mode: all

  - name: query_antipattern_analyzer
    params:
      enabled: true

  # LLM-as-a-Judge semantic validation (optional)
  # Uncomment and configure providers to enable semantic validation
  - name: semantic_llm_analyzer
    params:
      enabled: false
      # Prompt configuration
      prompt_file: "configs/semantic_llm_prompts.yaml"  # Path to prompt templates
      prompt_variant: default  # Options: variant_1, variant_2, default
      # custom_prompt: "Your custom prompt..."  # Override file/variant
      # Schema configuration
      schema_mode: query_derived  # Options: 'full' (all tables) or 'query_derived' (only tables referenced in query)
      num_examples: 2  # Number of example values per column in DDL Schema.

      # LLM Provider Configuration (environment variables resolved automatically)
      # Syntax: ${VAR_NAME} or ${VAR_NAME:default_value}
      providers:
        - name: openai
          api_key: "${OPENAI_API_KEY}"  # Or set in environment
          # api_key: ""  #  Or set in environment
          models:
            - name: gpt-5-mini
              weight: 1.0
              temperature: 1.0 
            # - name: gpt-5-mini
            #   weight: 1.0
            #   temperature: 1.0 
            # - name: gpt-4o
            #   weight: 1.0
            #   temperature: 0.0
            # - name: gpt-4o
            #   weight: 1.0
            #   temperature: 0.0

        # - name: anthropic
        #   api_key: "${ANTHROPIC_API_KEY}"
        #   models:
        #     - name: claude-3-5-sonnet-20241022
        #       weight: 1.0
        #       temperature: 0.0
        - name: gemini
          # Primary API key (required)
          api_key: "${GEMINI_API_KEY}"

          # Fallback keys for rate limit handling (optional)
          fallback_keys:
            - "${GEMINI_API_KEY_1}"
            - "${GEMINI_API_KEY_2}"
            - "${GEMINI_API_KEY_3}"
          models:
            - name: gemini-2.5-pro
              weight: 1.0
              temperature: 0.0
        # - name: ollama
        #   base_url: "${OLLAMA_BASE_URL:http://localhost:11434}"  # With default value
        #   models:
        #     - name: codeqwen:7b-chat-v1.5-q8_0
        #       weight: 1.0
        #       temperature: 0.0  # Per-model temperature setting

output:
  dataset_name: Spider Dataset

  # JSONL Metrics Configuration (optional)
  jsonl_enabled: true                  # Enable JSONL metrics storage
  # jsonl_path: "./custom/metrics"     # Optional: custom directory path

  # DuckDB Configuration (always enabled)
  # duckdb_path: "./custom/metrics.duckdb"  # Optional: custom path

  # Report Generation Configuration (optional, requires DuckDB which is always enabled)
  reports:
    enabled: true                      # Master switch for all report generation
    output_dir: "all_reports"          # Subfolder for reports (relative to output root)

    # Individual report toggles
    summary_report: true              # Main comprehensive report
    schema_validation: true           # Schema validation details
    llm_judge_issues: true            # LLM judge warnings/errors only
    query_execution_issues: true      # Failed executions only
    query_structure_profile: true     # Query structure analysis
    table_coverage: true              # Table usage coverage
    query_quality: true               # Quality assessment
  
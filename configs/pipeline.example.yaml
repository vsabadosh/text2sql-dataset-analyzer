sourceDb:
  dialect: sqlite           # or: postgresql
  kind: file                # or: server
  endpoint: "./data_examples/databases"    # sqlite root folder
  # postgresql example:
  # endpoint: "postgresql+psycopg://app:${PG_APP_PASS}@127.0.0.1:5432"

load:
  name: jsonl
  params:
    path: data_examples/train-comprehensive.jsonl

# Progress tracking configuration
progress:
  expected_items: 20       # Optional: Expected number of items for percentage tracking
  show_progress: true       # Optional: Show real-time progress bar (default: true)

normalize:
  - name: alias_mapper
    params:
      mapping:
        question: question
        sql: sql
        schema: schema
        dbId: db

  - name: id_assign        
    params:
      mode: incremental

  - name: db_identity_assign
    params: {}             

analyze:
  - name: schema_analysis_annot
    params: {}

  - name: query_syntax_annot
    params: {}

  - name: query_execution_annot
    params:
      mode: select_only
          
  - name: query_antipattern_annot
    params: {}    

output:
  dataset_name: analyses_spider_dataset
  
  # DuckDB Configuration (optional)
  duckdb_enabled: true                 # Enable DuckDB metrics storage
  # duckdb_path: "./custom/metrics.duckdb"  # Optional: custom path
  
  # Report Generation (optional, requires duckdb_enabled: true)
  auto_generate_report: true           # Auto-generate markdown report after pipeline completes
  
# Output files created:
# - annotatedOutputDataset.jsonl - Annotated dataset with analysis results
# - *_metrics.jsonl - Per-analyzer metrics files
# - metrics.duckdb - DuckDB database (if duckdb_enabled: true)
# - analysis_report.md - Comprehensive report (if auto_generate_report: true)
# - _run_info.json - Configuration and run metadata

# Progress tracking configuration
progress:
  expected_items: 44         # Optional: Expected number of items for percentage tracking
  show_progress: true         # Optional: Show real-time progress bar (default: true)

normalize:
  - name: alias_mapper
    params:
      mapping:
        question: question
        sql: query
        schema: schema
        dbId: db_id

  - name: id_assign        
    params:
      mode: incremental

  - name: db_identity_assign
    params: {}             

analyze:
  - name: schema_validation_analyzer
    params:
      enabled: true

  - name: query_syntax_analyzer
    params:
      enabled: true

  - name: query_execution_analyzer
    params:
      enabled: true
      mode: all

  - name: query_antipattern_analyzer
    params:
      enabled: true
      # ═══════════════════════════════════════════════════════════════════════════════
      # SEVERITY PENALTIES (for quality score calculation)
      # ═══════════════════════════════════════════════════════════════════════════════
      # Quality Score = 100 - sum(penalty * count_of_antipatterns_at_severity)
      # Customize penalties based on your dataset's quality requirements
      penalties:
        critical: 30    # Severe: always wrong results
        high: 15        # Dangerous: wrong in edge cases
        medium: 5       # Performance/quality issues
        low: 2          # Style preferences
        # Custom severity levels (if you define your own):
      # ═══════════════════════════════════════════════════════════════════════════════
      # ANTIPATTERN SEVERITY LEVELS
      # ═══════════════════════════════════════════════════════════════════════════════
      # 
      # 🔴 CRITICAL: Always produces WRONG RESULTS or causes DATA SAFETY issues
      #    → Must be fixed immediately
      #    → Query returns incorrect data or risks data loss
      # 
      # ⚠️  HIGH: Produces WRONG RESULTS in specific cases (subtle semantic errors)
      #    → Dangerous patterns that fail under certain conditions
      #    → Query works in some cases but breaks with NULL, edge cases, etc.
      # 
      # 🔵 MEDIUM: Correct results but PERFORMANCE or CODE QUALITY issues
      #    → Optimization opportunities (slow queries, index-breaking)
      #    → Redundant operations that waste resources
      #    → Modern SQL best practices violations
      # 
      # 🟢 LOW: STYLE preferences or CONTEXT-DEPENDENT patterns
      #    → Acceptable in Text2SQL benchmarks
      #    → May be problematic in production but not for research datasets
      # ═══════════════════════════════════════════════════════════════════════════════      
      antipatterns:
        sqlite:
          critical:
            # ❌ ALWAYS WRONG RESULTS
            - null_comparison_equals         # `= NULL` instead of `IS NULL` (always evaluates to NULL/false)
            - missing_group_by               # Non-aggregated columns without GROUP BY (SQL semantic error)
            # 💥 DATA SAFETY
            - unsafe_update_delete           # UPDATE/DELETE without WHERE (accidental data loss)
            # 📊 UNINTENDED RESULTS
            - cartesian_product              # Missing JOIN condition (exponential result explosion)
          high:
            # ⚠️  SUBTLE SEMANTIC TRAPS (correct in some cases, wrong in others)
            - not_in_nullable                # `NOT IN (subquery)` when subquery can return NULL → always false
            - implicit_join                  # Comma-joins risk accidental cartesian products (missing WHERE)
          medium:
            # 🐌 PERFORMANCE KILLERS
            - function_in_where              # Functions on indexed columns prevent index usage
            - correlated_subquery            # Row-by-row execution (often has better alternatives)
            - leading_wildcard_like          # `LIKE '%pattern'` forces full table scan
            - union_instead_of_union_all     # UNION deduplicates when not needed (extra sort cost)
            # ♻️  REDUNDANCY & CODE QUALITY
            - redundant_distinct             # DISTINCT with GROUP BY (duplicate elimination already guaranteed)
            - select_in_exists               # `SELECT col` in EXISTS (only checks row presence, wastes I/O)
          low:
            # 📝 STYLE / ACCEPTABLE IN TEXT2SQL BENCHMARKS
            - select_star                    # `SELECT *` (common in research datasets, avoided in production)
        postgresql:
          critical:
            - null_comparison_equals         # `= NULL` instead of `IS NULL`
            - missing_group_by               # Non-aggregated columns without GROUP BY
            - unsafe_update_delete           # UPDATE/DELETE without WHERE
            - cartesian_product              # Missing JOIN condition
          
          high:
            - not_in_nullable                # `NOT IN` with nullable subquery
            - implicit_join                  # Comma-joins (error-prone)
          
          medium:
            - function_in_where              # Index-breaking functions in WHERE
            - correlated_subquery            # Inefficient row-by-row execution
            - union_instead_of_union_all     # Unnecessary deduplication cost
            - leading_wildcard_like          # Full table scan pattern
            - redundant_distinct             # DISTINCT + GROUP BY redundancy
            - select_in_exists               # Wasteful column selection in EXISTS
          
          low:
            - select_star                    # Style preference (acceptable in Text2SQL)


  # LLM-as-a-Judge semantic validation (optional)
  # Uncomment and configure providers to enable semantic validation
  - name: semantic_llm_analyzer
    params:
      enabled: false
      # Prompt configuration
      prompt_file: "configs/semantic_llm_prompts.yaml"  # Path to prompt templates
      prompt_variant: default  # Options: variant_1, variant_2, default
      # custom_prompt: "Your custom prompt..."  # Override file/variant
      # Schema configuration
      schema_mode: full  # Options: 'full' (all tables) or 'query_derived' (only tables referenced in query)
      num_examples: 2  # Number of example values per column in DDL Schema.
      parallel_voters: true
      max_workers: 2   # 0 or omit -> auto = num providers; set 2..N to cap

      # LLM Provider Configuration (environment variables resolved automatically)
      # Syntax: ${VAR_NAME} or ${VAR_NAME:default_value}
      providers:
        - name: openai
          api_key: "${OPENAI_API_KEY}"  # Or set in environment
          # api_key: ""  #  Or set in environment
          models:
            - name: gpt-5
              weight: 1.0
              temperature: 1.0 
            # - name: gpt-5-nano
            #   weight: 1.0
            #   temperature: 1.0 
            # # - name: gpt-4o
            #   weight: 1.0
            #   temperature: 0.0
            # - name: gpt-4o
            #   weight: 1.0
            #   temperature: 0.0

        # # - name: anthropic
        # #   api_key: "${ANTHROPIC_API_KEY}"
        # #   models:
        # #     - name: claude-3-5-sonnet-20241022
        # #       weight: 1.0
        # #       temperature: 0.0
        - name: gemini
          # Primary API key (required)
          api_key: "${GEMINI_API_KEY}"

          # Fallback keys for rate limit handling (optional)
          fallback_keys:
            # - "${GEMINI_API_KEY_1}"
            # - "${GEMINI_API_KEY_2}"
            # - "${GEMINI_API_KEY_3}"

          models:
            - name: gemini-2.5-pro
              weight: 1.0
              temperature: 0.0
        # - name: ollama
        #   base_url: "${OLLAMA_BASE_URL:http://localhost:11434}"  # With default value
        #   models:
        #     - name: codeqwen:7b-chat-v1.5-q8_0
        #       weight: 1.0
        #       temperature: 0.0  # Per-model temperature setting

output:
  dataset_name: Spider_TEST_TINY_03_12_25
  # base_dir: "."                        # Root directory for output (default: current directory)

  # JSONL Metrics Configuration (optional)
  jsonl_enabled: true                  # Enable JSONL metrics storage
  # jsonl_path: "./custom/metrics"     # Optional: custom directory path

  # DuckDB Configuration (always enabled)
  # duckdb_path: "Spider_Test_Dataset_Revisit/metrics.duckdb"  # Optional: custom path

  # Report Generation Configuration (optional, requires DuckDB which is always enabled)
  reports:
    enabled: true                      # Master switch for all report generation
    output_dir: "all_reports"          # Subfolder for reports (relative to output root)

    # Individual report toggles
    summary_report: true              # Main comprehensive report
    schema_validation: true           # Schema validation details
    llm_judge_issues: true            # LLM judge warnings/errors only
    query_execution_issues: true      # Failed executions only
    query_structure_profile: true     # Query structure analysis
    table_coverage: true              # Table usage coverage
    query_quality: true               # Quality assessment
  
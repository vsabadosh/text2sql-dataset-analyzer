sourceDb:
  dialect: sqlite           # or: postgresql
  kind: file                # or: server
  endpoint: "./data_examples/databases"    # sqlite root folder
  # endpoint: /Users/volodyms/projects/LLM/llm_tuning/spiderNew/database
  # endpoint: /Users/volodyms/projects/LLM/llm_tuning/bird_train_20240627/train_databases
  # postgresql example:
  # endpoint: "postgresql+psycopg://app:${PG_APP_PASS}@127.0.0.1:5432"

load:
  name: jsonl
  params:
    path: data_examples/spider_tiny.jsonl
# Progress tracking configuration
progress:
  expected_items: 8659        # Optional: Expected number of items for percentage tracking
  show_progress: true       # Optional: Show real-time progress bar (default: true)

normalize:
  - name: alias_mapper
    params:
      mapping:
        question: question
        sql: query
        schema: schema
        dbId: db_id

  - name: id_assign        
    params:
      mode: incremental

  - name: db_identity_assign
    params: {}             

analyze:
  - name: schema_analysis_annot
    params: {}

  - name: query_syntax_annot
    params: {}

  - name: query_execution_annot
    params:
      mode: all
          
  - name: query_antipattern_annot
    params: {}
  
  # LLM-as-a-Judge semantic validation (optional)
